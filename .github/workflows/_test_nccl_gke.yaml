name: ~Test NCCL Kubernetes (GKE)

on:
  workflow_call:
    inputs:
      JAX_IMAGE:
        type: string
        description: JAX image from ghcr.io/nvidia
        default: ghcr.io/nvidia/jax-toolbox-internal:15729070690-base-amd64
        required: false

jobs:
  build-nccl-gke:
    runs-on: [self-hosted, "amd64", "large"]
    steps:
      - uses: actions/checkout@v6
      - name: Login to nvcr.io Container Registry
        uses: docker/login-action@v4
        with:
          registry: nvcr.io
          username: $oauthtoken
          password: ${{ secrets.NVCR_TOKEN }}
      - name: Build NCCL image
        id: build
        uses: ./.github/actions/build-container
        with:
          ARCHITECTURE: amd64
          ARTIFACT_NAME: artifact-nccl-gke-build
          BADGE_FILENAME: badge-nccl-gke-build
          BUILD_DATE: 0000-00-00 # not important; this image is never published
          BASE_IMAGE: ${{ inputs.JAX_IMAGE }}
          CONTAINER_NAME: nccl-gke
          DOCKERFILE: .github/container/Dockerfile.nccl-gke
          RUNNER_SIZE: small
          DOCKER_CONTEXT: .
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-known-hosts: ${{ vars.SSH_KNOWN_HOSTS }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          bazel-remote-cache-url: ${{ vars.BAZEL_REMOTE_CACHE_URL }}
          require-nsys-jax-version-artifact: "false"
    outputs:
      DOCKER_TAG_FINAL:   ${{ steps.build.outputs.DOCKER_TAG_FINAL }}

  nccl-gke:
    runs-on: gke-a3mega

    needs: build-nccl-gke

    strategy:
      matrix:
        test: [all_gather_perf_mpi, all_reduce_perf_mpi, broadcast_perf_mpi, reduce_scatter_perf_mpi]

    env:
      BASE_IMAGE: ${{ needs.build-nccl-gke.outputs.DOCKER_TAG_FINAL }}
      TEST_NAME: ${{ matrix.test }}
      NAME: nccl-gke
      NHOSTS: 2
      NUM_GPUS: 8
      NCCL_MINBYTES: 8
      NCCL_MAXBYTES: 16G
      NCCL_STEPFACTOR: 2
      NCCL_ITERS: 100

    steps:
    - uses: actions/checkout@v6

    - name: Set workload name prefix # due to 40 char limit
      id: workload-name
      run: |
        TEST_NAME=$(echo "${{ matrix.test }}" | sed 's/_perf_mpi//g' | sed 's/_/-/g')
        JOBSET_PREFIX="${{ env.NAME }}-${TEST_NAME}"

        echo "JOBSET_PREFIX=${JOBSET_PREFIX}" >> ${GITHUB_OUTPUT}

    - name: Run XPK workload on cluster
      uses: ./.github/actions/gke-xpk
      with:
        IMAGE: ${{ env.BASE_IMAGE }}
        NAME: ${{ steps.workload-name.outputs.JOBSET_PREFIX }}
        ENVS: |
          OMPI_MCA_orte_keep_fqdn_hostnames=1;
          PRTE_MCA_prte_keep_fqdn_hostnames=1;
          MPI_MCA_orte_default_hostfile=/scripts/hostfiles${{ env.NHOSTS }}/hostfile${{ env.NUM_GPUS }};
          PRTE_MCA_prte_default_hostfile=/scripts/hostfiles${{ env.NHOSTS }}/hostfile${{ env.NUM_GPUS }};
          NCCL_MINBYTES=${{ env.NCCL_MINBYTES }};
          NCCL_MAXBYTES=${{ env.NCCL_MAXBYTES }};
          NCCL_STEPFACTOR=${{ env.NCCL_STEPFACTOR }};
          NCCL_ITERS=${{ env.NCCL_ITERS }};
        COMMAND: |
          mpirun --version;
          ompi_info --version;

          service ssh restart;
          declare -a hosts=(\${JOBSET_NAME}-\${REPLICATED_JOB_NAME}-0-0.\${JOBSET_NAME} \${JOBSET_NAME}-\${REPLICATED_JOB_NAME}-0-1.\${JOBSET_NAME});

          /scripts/nccl-test-launch.sh ${{ matrix.test }} \${hosts[@]} |&
          tee /opt/output/output.log &> /dev/stdout;

          MAYBE_MPI_EXIT_CODE=\$(tail /opt/output/output.log | rg 'Exit code:[ ]+([0-9]+)' -or '\$1');
          if [ -z \${MAYBE_MPI_EXIT_CODE} ]; then
            EXIT_CODE=0;
          else
            EXIT_CODE=\${MAYBE_MPI_EXIT_CODE};
          fi;
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NVCR_TOKEN: ${{ secrets.NVCR_TOKEN }}
