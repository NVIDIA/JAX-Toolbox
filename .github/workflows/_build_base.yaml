name: ~build CUDA+Python base container

on:
  workflow_call:
    inputs:
      ARCHITECTURE:
        type: string
        description: 'CPU architecture to build the image for, e.g. amd64, arm64'
        required: true
      BASE_IMAGE:
        type: string
        description: 'Base CUDA image, e.g. nvidia/cuda:X.Y.Z-devel-ubuntu22.04'
        required: false
        default: latest
      BUILD_DATE:
        type: string
        description: "Build date in YYYY-MM-DD format"
        required: false
        default: 'NOT SPECIFIED'
      ARTIFACT_NAME:
        type: string
        description: 'Name of the artifact zip file'
        required: false
        default: 'artifact-base-build'
      BADGE_FILENAME:
        type: string
        description: 'Name of the endpoint JSON file for shields.io badge'
        required: false
        default: 'badge-base-build'
      GIT_USER_NAME:
        type: string
        description: 'Username in GIT to perform git pull/push'
        required: false
        default: 'JAX Toolbox'
      GIT_USER_EMAIL:
        type: string
        description: 'User email in GIT to perform git pull/push'
        required: false
        default: 'jax@nvidia.com'
      MANIFEST_ARTIFACT_NAME:
        type: string
        description: Artifact name in current run w/ manifest/patches. Leaving empty uses manifest/patches in current branch
        default: ''
        required: false
    outputs:
      DOCKER_TAG:
        description: "Tag of the image built"
        value: ${{ jobs.build-base.outputs.DOCKER_TAG }}

env:
  UPLD_IMAGE: ghcr.io/nvidia/jax-toolbox-internal

permissions:
  contents: read  # to fetch code
  actions:  write # to cancel previous workflows
  packages: write # to upload container

jobs:

  build-base:
    runs-on: ${{ inputs.ARCHITECTURE == 'amd64' && 'linux-amd64-cpu16' || 'linux-arm64-cpu16' }}
    env:
      BADGE_FILENAME_FULL: ${{ inputs.BADGE_FILENAME }}-${{ inputs.ARCHITECTURE }}.json
    outputs:
      DOCKER_TAG: ${{ steps.base-tag.outputs.tag }}
    steps:
      - name: Print environment variables
        run: env

      - name: Check out the repository under ${GITHUB_WORKSPACE}
        uses: actions/checkout@v4

      - name: Delete checked-out manifest and patches
        if: inputs.MANIFEST_ARTIFACT_NAME != ''
        run: |
          rm .github/container/manifest.yaml
          rm -rf .github/container/patches

      - name: Replace checked-out manifest file/patches with bumped one
        if: inputs.MANIFEST_ARTIFACT_NAME != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.MANIFEST_ARTIFACT_NAME }}
          path: .github/container/

      - name: Log the changes in manifest file and patch folder
        working-directory: .github/container
        shell: bash -x -e {0}
        run: |
          ls -lah
          ls -lah patches
          echo "Changes in manifest file and patch folder"
          git diff

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.12.1
          version: v0.30.1

      - name: Compute base image tag
        id: base-tag
        shell: bash -euo pipefail {0}
        run: |
          hash_inputs=(
            ".github/container/Dockerfile.base"
            ".github/container/manifest.yaml"
            ".github/container/git-clone.sh"
            ".github/container/pip-finalize.sh"
            ".github/container/pip-vcs-equivalency.patch"
            ".github/container/create-distribution.sh"
            ".github/container/bump.sh"
            ".github/container/jax-nccl-test"
            ".github/container/parallel-launch"
            ".github/container/nccl-sanity-check.cu"
          )
          while IFS= read -r -d '' file; do
            hash_inputs+=("${file}")
          done < <(find .github/container -maxdepth 1 -type f \( -name 'install-*.sh' -o -name 'symlnk-*.sh' \) -print0 | sort -z)
          while IFS= read -r -d '' file; do
            hash_inputs+=("${file}")
          done < <(find .github/container/patches -type f -print0 2>/dev/null | sort -z || true)

          combined_hash="$(
            {
              printf 'BASE_IMAGE=%s\n' "${{ inputs.BASE_IMAGE }}"
              printf 'ARCHITECTURE=%s\n' "${{ inputs.ARCHITECTURE }}"
              for f in "${hash_inputs[@]}"; do
                printf 'FILE=%s\n' "${f}"
                sha256sum "${f}"
              done
            } | sha256sum | cut -c1-20
          )"
          echo "tag=${UPLD_IMAGE}:base-${{ inputs.ARCHITECTURE }}-${combined_hash}" >> "$GITHUB_OUTPUT"

      - name: Check if base image already exists
        id: base-exists
        shell: bash -euo pipefail {0}
        run: |
          if docker buildx imagetools inspect "${{ steps.base-tag.outputs.tag }}" >/dev/null 2>&1; then
            echo "hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build base image
        id: build
        if: steps.base-exists.outputs.hit != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .github/container
          push: true
          file: .github/container/Dockerfile.base
          platforms: linux/${{ inputs.ARCHITECTURE }}
          tags: |
            ${{ steps.base-tag.outputs.tag }}
          build-args: |
            GIT_USER_NAME=${{ inputs.GIT_USER_NAME }}
            GIT_USER_EMAIL=${{ inputs.GIT_USER_EMAIL }}
            BUILD_DATE=${{ inputs.BUILD_DATE }}
            JAX_TOOLBOX_REF=main
            ${{ inputs.BASE_IMAGE != 'latest' && format('BASE_IMAGE={0}', inputs.BASE_IMAGE) || '' }}

      - name: Resolve base image digest
        id: base-digest
        shell: bash -euo pipefail {0}
        run: |
          digest="$(docker buildx imagetools inspect "${{ steps.base-tag.outputs.tag }}" --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"' || true)"
          if [[ -z "${digest}" || "${digest}" == "null" ]]; then
            digest="unknown"
          fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Generate sitrep
        if: "!cancelled()"
        shell: bash -x -e {0}
        run: |
          # bring in utility functions
          source .github/workflows/scripts/to_json.sh

          badge_label='Base image ${{ inputs.ARCHITECTURE }} build'
          tags="${{ steps.base-tag.outputs.tag }}"
          digest="${{ steps.base-digest.outputs.digest }}"
          if [[ "${{ steps.base-exists.outputs.hit }}" == "true" ]]; then
            outcome="cache-hit"
          else
            outcome="${{ steps.build.outcome }}"
          fi

          if [[ "${outcome}" == "success" || "${outcome}" == "cache-hit" ]]; then
            badge_message="pass"
            badge_color=brightgreen
            summary="Base image build on ${{ inputs.ARCHITECTURE }}: $badge_message"
          else
            badge_message="fail"
            badge_color=red
            summary="Base image build on ${{ inputs.ARCHITECTURE }}: $badge_message"
          fi

          to_json \
            summary \
            badge_label tags digest outcome \
          > sitrep.json

          schemaVersion=1 \
          label="${badge_label}" \
          message="${badge_message}" \
          color="${badge_color}" \
          to_json schemaVersion label message color \
          > ${{ env.BADGE_FILENAME_FULL }}

      - name: Upload sitrep and badge
        if: "!cancelled()"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.ARTIFACT_NAME }}-${{ inputs.ARCHITECTURE }}
          path: |
            sitrep.json
            ${{ env.BADGE_FILENAME_FULL }}
