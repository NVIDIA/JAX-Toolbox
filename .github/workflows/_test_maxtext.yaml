name: ~test MaxText functionality

on:
  workflow_call:
    inputs:
      MAXTEXT_IMAGE:
        type: string
        description: MaxText image from ghcr.io/nvidia
        default: ghcr.io/nvidia/jax:maxtext
        required: false
      EXTRA_TEST_ARGS:
        type: string
        description: Extra command line args to pass to test-maxtext.sh
        default: ""
        required: false
      BADGE_FILENAME:
        type: string
        description: 'Name of the endpoint JSON file for shields.io badge'
        required: false
        default: 'badge-maxtext-test.json'
      ARTIFACT_NAME:
        type: string
        description: 'Name of the artifact zip file'
        required: false
        default: 'artifact-maxtext-test'
      FW_NAME:
        type: string
        description: 'Name of the framework being used'
        required: false
        default: 'upstream-maxtext'
    outputs:
      TEST_STATUS:
        description: 'Summary pass/fail value indicating if results from tests are acceptable'
        value: ${{ jobs.sitrep.outputs.STATUS }}

jobs:
  single-process-multi-device:
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        include:
          - RUNNER: linux-amd64-gpu-h100-latest-1
            TEST_CASE_NAME: 1DP1FSDP1TP1PP_single_process_a100_1gpu
            DP: 1
            FSDP: 1
            TP: 1
            PP: 1
          - RUNNER: linux-amd64-gpu-h100-latest-2
            TEST_CASE_NAME: 1DP2FSDP1TP1PP_single_process_h100_2gpu
            DP: 1
            FSDP: 2
            TP: 1
            PP: 1
    runs-on: ${{ matrix.RUNNER }}
    steps:
      - name: Print environment variables
        run: env

      - name: Check out the repository under ${GITHUB_WORKSPACE}
        uses: actions/checkout@v4

      - name: Labels and metadata
        id: meta
        shell: bash -euo pipefail {0}
        run: |
          TEST_CASE_NAME="${{ matrix.TEST_CASE_NAME }}"
          JOB_NAME="${{ inputs.FW_NAME }}-${GITHUB_RUN_ID}-${TEST_CASE_NAME}"
          echo "TEST_CASE_NAME=${TEST_CASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "JOB_NAME=${JOB_NAME}" >> "$GITHUB_OUTPUT"

      - name: Run MaxText test in Docker
        shell: bash -euo pipefail {0}
        run: |
          mkdir -p "output/${{ steps.meta.outputs.JOB_NAME }}"

          set +e
          docker run --rm -i --shm-size=1g --gpus all \
            -v "$PWD/output:/output" \
            "${{ inputs.MAXTEXT_IMAGE }}" \
            bash -euxo pipefail -c "
              test-maxtext.sh \
                --output /output/${{ steps.meta.outputs.JOB_NAME }} \
                --dtype bfloat16 \
                --mem-fraction 0.65 \
                --decoder-block default \
                --attn-type dot_product \
                --batch-per-gpu 2 \
                --steps 10 \
                --pipeline-parallel ${{ matrix.PP }} \
                --data-parallel ${{ matrix.DP }} \
                --fsdp ${{ matrix.FSDP }} \
                --tensor-parallel ${{ matrix.TP }} \
                --nodes 1 \
                ${{ inputs.EXTRA_TEST_ARGS }}"
          EXITCODE=$?
          set -e

          STATE="COMPLETED"
          if [[ "${EXITCODE}" != "0" ]]; then
            STATE="FAILED"
          fi

          python3 - <<EOF_JSON
          import json
          with open("output/${{ steps.meta.outputs.TEST_CASE_NAME }}-status.json", "w") as f:
              json.dump({"state": "${STATE}", "exitcode": "${EXITCODE}"}, f)
          EOF_JSON

          if [[ "${EXITCODE}" != "0" ]]; then
            exit "${EXITCODE}"
          fi

      - name: Upload training logs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.JOB_NAME }}
          path: |
            output/${{ steps.meta.outputs.JOB_NAME }}
            output/${{ steps.meta.outputs.TEST_CASE_NAME }}-status.json

  # maxtext-multinode:
  #   Disabled while migrating from SLURM/jumpbox to NVKS docker runners.
  #   Multi-node validation will be re-enabled once an equivalent runtime orchestration is available.

  metrics:
    name: test-maxtext-metrics
    needs: [single-process-multi-device]
    if: "!cancelled()"
    runs-on: ubuntu-22.04
    steps:
      - name: Check out the repository under ${GITHUB_WORKSPACE}
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Summarize metrics and generate report log
        shell: bash -euo pipefail {0}
        run: |
          pip install 'numpy<2.0.0' tensorboard

          shopt -s nullglob
          metrics_count=0
          for i in ${{ inputs.FW_NAME }}-${GITHUB_RUN_ID}-*; do
            JOB_NAME=$(echo "$i" | awk -F "${GITHUB_RUN_ID}-" '{print $2}')
            if [[ -d "$i/$JOB_NAME" ]]; then
              METRIC_PATH=${JOB_NAME}_metrics.json
              if python3 .github/workflows/baselines/summarize_metrics.py "$i/$JOB_NAME" --loss_summary_name "learning/loss" --perf_summary_name "perf/step_time_seconds" --output_json_path "$METRIC_PATH"; then
                metrics_count=$((metrics_count + 1))
              fi
            fi
          done

          if [[ "${metrics_count}" -gt 0 ]]; then
            printf '%s\n' '{"$report_type":"TestReport","when":"call","outcome":"passed","nodeid":"maxtext-metrics-smoke"}' > report.jsonl
          else
            printf '%s\n' '{"$report_type":"TestReport","when":"call","outcome":"failed","nodeid":"maxtext-metrics-smoke"}' > report.jsonl
          fi

      - name: Upload metrics test json logs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.FW_NAME }}-metrics-test-log
          path: |
            report.jsonl
            *_metrics.json

  sitrep:
    name: test-maxtext-sitrep
    needs: [single-process-multi-device, metrics]
    if: "!cancelled()"
    uses: ./.github/workflows/_sitrep_mgmn.yaml
    secrets: inherit
    with:
      BADGE_FILENAME: ${{ inputs.BADGE_FILENAME }}
      ARTIFACT_NAME: ${{ inputs.ARTIFACT_NAME }}
      FW_NAME: ${{ inputs.FW_NAME }}

  outcome:
    name: test-maxtext-outcome
    needs: sitrep
    runs-on: ubuntu-22.04
    if: "!cancelled()"
    steps:
      - name: Sets workflow status based on test outputs
        run: |
          if [[ ${{ needs.sitrep.outputs.STATUS }} != 'success' ]]; then
            exit 1
          fi
