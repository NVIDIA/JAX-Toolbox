name: ~CI, single-arch
run-name: CI-${{ inputs.ARCHITECTURE }}
on:
  workflow_call:
    inputs:
      ARCHITECTURE:
        type: string
        required: true
      BUILD_DATE:
        type: string
        description: 'Build date in YYYY-MM-DD format'
        required: false
        default: NOT SPECIFIED
      CUDA_IMAGE:
        type: string
        description: CUDA image to use as base, e.g. nvidia/cuda:X.Y.Z-devel-ubuntu22.04
        default: 'latest'
        required: false
      MANIFEST_ARTIFACT_NAME:
        type: string
        description: 'Artifact name in current run w/ manifest/patches. Leaving empty uses manifest/patches in current branch'
        default: ''
        required: false
      SOURCE_URLREFS:
        type: string
        description: 'A JSON object containing git url+refs for softwares to be built'
        required: false
        default: '{}'
      MODE:
        type: string
        description: 'Mode selection for running specific tests only'
        required: false
        default: full
    outputs:
      DOCKER_TAGS:
        description: 'JSON object containing tags of all docker images built'
        value: ${{ jobs.collect-docker-tags.outputs.TAGS }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.ARCHITECTURE }}
  cancel-in-progress: true

permissions:
  contents: read  # to fetch code
  actions:  write # to cancel previous workflows
  id-token: write # to assume the AWS role for bazel-remote cache
  packages: write # to upload container

jobs:
  build-base:
    uses: ./.github/workflows/_build_base.yaml
    with:
      ARCHITECTURE: ${{ inputs.ARCHITECTURE }}
      BASE_IMAGE: ${{ inputs.CUDA_IMAGE }}
      BUILD_DATE: ${{ inputs.BUILD_DATE }}
      MANIFEST_ARTIFACT_NAME: ${{ inputs.MANIFEST_ARTIFACT_NAME }}
    secrets: inherit

  test-nccl:
    if: inputs.ARCHITECTURE == 'amd64' # build only amd64
    needs: build-base
    uses: ./.github/workflows/_test_nccl.yaml
    with:
      CONTAINER: ${{ needs.build-base.outputs.DOCKER_TAG }}
    secrets: inherit

  build-jax:
    needs: build-base
    runs-on: ${{ inputs.ARCHITECTURE == 'amd64' && 'linux-amd64-cpu32m' || 'linux-arm64-cpu32m' }}
    steps:
        - name: Checkout repository
          uses: actions/checkout@v6
        - name: Configure AWS credentials via OIDC
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: ${{ secrets.S3_CACHE_ROLE }}
            aws-region: ${{ secrets.AWS_REGION}}
        - name: Start bazel-remote sidecar
          env:
            BAZEL_REMOTE_BUCKET: ${{ secrets.BAZEL_REMOTE_BUCKET }}
            BAZEL_REMOTE_AWS_DIR: /tmp/bazel-remote-aws
            BAZEL_REMOTE_CONTAINER: bazel-remote-cache-${{ inputs.ARCHITECTURE }}
            BAZEL_REMOTE_DISK_DIR: /tmp/bazel-remote-cache
            BAZEL_REMOTE_DIAGNOSTICS_DIR: /tmp/bazel-remote-diagnostics
            BAZEL_REMOTE_PORT: 9090
            BAZEL_REMOTE_PREFIX: bazel-remote/${{ inputs.ARCHITECTURE }}
            BAZEL_REMOTE_REGION: ${{ secrets.AWS_REGION }}
          run: |
            set -euxo pipefail
            : "${AWS_ACCESS_KEY_ID:?missing AWS_ACCESS_KEY_ID}"
            : "${AWS_SECRET_ACCESS_KEY:?missing AWS_SECRET_ACCESS_KEY}"
            : "${AWS_SESSION_TOKEN:?missing AWS_SESSION_TOKEN}"
            BAZEL_REMOTE_AWS_CREDENTIALS="${BAZEL_REMOTE_AWS_DIR}/credentials"
            mkdir -p "${BAZEL_REMOTE_DIAGNOSTICS_DIR}" "${BAZEL_REMOTE_DISK_DIR}" "${BAZEL_REMOTE_AWS_DIR}"
            BAZEL_REMOTE_UID="$(id -u)"
            BAZEL_REMOTE_GID="$(id -g)"
            set +x
            umask 077
            {
              printf '[default]\n'
              printf 'aws_access_key_id=%s\n' "${AWS_ACCESS_KEY_ID}"
              printf 'aws_secret_access_key=%s\n' "${AWS_SECRET_ACCESS_KEY}"
              printf 'aws_session_token=%s\n' "${AWS_SESSION_TOKEN}"
            } > "${BAZEL_REMOTE_AWS_CREDENTIALS}"
            set -x
            docker rm -f "${BAZEL_REMOTE_CONTAINER}" >/dev/null 2>&1 || true
            docker run -d \
              --name "${BAZEL_REMOTE_CONTAINER}" \
              --user "${BAZEL_REMOTE_UID}:${BAZEL_REMOTE_GID}" \
              --publish "127.0.0.1:${BAZEL_REMOTE_PORT}:8080" \
              --volume "${BAZEL_REMOTE_DISK_DIR}:/data" \
              --volume "${BAZEL_REMOTE_AWS_CREDENTIALS}:/aws-config/credentials:ro" \
              buchgr/bazel-remote-cache \
              --dir /data \
              --max_size 50 \
              --http_address=0.0.0.0:8080 \
              --s3.auth_method=aws_credentials_file \
              --s3.aws_profile=default \
              --s3.aws_shared_credentials_file=/aws-config/credentials \
              --s3.bucket="${BAZEL_REMOTE_BUCKET}" \
              --s3.endpoint="s3.${BAZEL_REMOTE_REGION}.amazonaws.com" \
              --s3.prefix="${BAZEL_REMOTE_PREFIX}" \
              --s3.region="${BAZEL_REMOTE_REGION}" \
              --s3.update_timestamps
        - name: Verify bazel-remote sidecar
          env:
            BAZEL_REMOTE_CONTAINER: bazel-remote-cache-${{ inputs.ARCHITECTURE }}
            BAZEL_REMOTE_DIAGNOSTICS_DIR: /tmp/bazel-remote-diagnostics
            BAZEL_REMOTE_PORT: 9090
          run: |
            set -euxo pipefail
            ready=0
            for _ in $(seq 1 30); do
              if curl -sSf "http://127.0.0.1:${BAZEL_REMOTE_PORT}/status" > "${BAZEL_REMOTE_DIAGNOSTICS_DIR}/status-before.json"; then
                ready=1
                break
              fi
              container_running="$(docker inspect -f '{{.State.Running}}' "${BAZEL_REMOTE_CONTAINER}" 2>/dev/null || echo false)"
              if [[ "${container_running}" != "true" ]]; then
                docker ps -a
                docker logs "${BAZEL_REMOTE_CONTAINER}" || true
                exit 1
              fi
              sleep 1
            done
            if [[ "${ready}" != "1" ]]; then
              docker ps -a
              docker logs "${BAZEL_REMOTE_CONTAINER}" || true
              exit 1
            fi
            curl -sSIf "http://127.0.0.1:${BAZEL_REMOTE_PORT}/cas/e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" \
              > "${BAZEL_REMOTE_DIAGNOSTICS_DIR}/empty-cas-head.txt"
        - name: Build JAX container
          id: build-jax
          uses: ./.github/actions/build-container
          with:
            ARCHITECTURE: ${{ inputs.ARCHITECTURE }}
            ARTIFACT_NAME: artifact-jax-build
            BADGE_FILENAME: badge-jax-build
            BUILD_DATE: ${{ inputs.BUILD_DATE }}
            BASE_IMAGE: ${{ needs.build-base.outputs.DOCKER_TAG }}
            CONTAINER_NAME: jax
            DOCKERFILE: .github/container/Dockerfile.jax
            RUNNER_SIZE: large
            ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
            ssh-known-hosts: ${{ vars.SSH_KNOWN_HOSTS }}
            github-token: ${{ secrets.GITHUB_TOKEN }}
            bazel-remote-cache-url: http://127.0.0.1:9090
            docker-build-allow: network.host
            docker-build-network: host
            registry-build-context-name: mealkit
            EXTRA_BUILD_ARGS: |
              URLREF_JAX=${{ fromJson(inputs.SOURCE_URLREFS).JAX }}
              URLREF_XLA=${{ fromJson(inputs.SOURCE_URLREFS).XLA }}
              URLREF_FLAX=${{ fromJson(inputs.SOURCE_URLREFS).FLAX }}
              URLREF_TRANSFORMER_ENGINE=${{ fromJson(inputs.SOURCE_URLREFS).TRANSFORMER_ENGINE }}
        - name: Collect bazel-remote diagnostics
          if: always()
          env:
            BAZEL_REMOTE_CONTAINER: bazel-remote-cache-${{ inputs.ARCHITECTURE }}
            BAZEL_REMOTE_DIAGNOSTICS_DIR: /tmp/bazel-remote-diagnostics
            BAZEL_REMOTE_PORT: 9090
          run: |
            set -euxo pipefail
            mkdir -p "${BAZEL_REMOTE_DIAGNOSTICS_DIR}"
            curl -sSf "http://127.0.0.1:${BAZEL_REMOTE_PORT}/status" > "${BAZEL_REMOTE_DIAGNOSTICS_DIR}/status-after.json" || true
            docker logs "${BAZEL_REMOTE_CONTAINER}" > "${BAZEL_REMOTE_DIAGNOSTICS_DIR}/container.log" 2>&1 || true
        - name: Upload bazel-remote diagnostics
          if: always()
          uses: actions/upload-artifact@v6
          with:
            name: bazel-remote-diagnostics-${{ inputs.ARCHITECTURE }}
            path: /tmp/bazel-remote-diagnostics
        - name: Stop bazel-remote sidecar
          if: always()
          run: |
            docker rm -f "bazel-remote-cache-${{ inputs.ARCHITECTURE }}" || true
            rm -rf /tmp/bazel-remote-aws
    outputs:
      DOCKER_TAG_MEALKIT: ${{ steps.build-jax.outputs.DOCKER_TAG_MEALKIT }}
      DOCKER_TAG_FINAL:   ${{ steps.build-jax.outputs.DOCKER_TAG_FINAL }}

  build-equinox:
    needs: build-jax
    runs-on: ${{ inputs.ARCHITECTURE == 'amd64' && 'linux-amd64-cpu16m' || 'linux-arm64-cpu16m' }}
    outputs:
      DOCKER_TAG_MEALKIT: ${{ steps.build-equinox.outputs.DOCKER_TAG_MEALKIT }}
      DOCKER_TAG_FINAL: ${{ steps.build-equinox.outputs.DOCKER_TAG_FINAL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build Equinox container
        id: build-equinox
        uses: ./.github/actions/build-container
        with:
          ARCHITECTURE: ${{ inputs.ARCHITECTURE }}
          ARTIFACT_NAME: artifact-equinox-build
          BADGE_FILENAME: badge-equinox-build
          BUILD_DATE: ${{ inputs.BUILD_DATE }}
          BASE_IMAGE: ${{ needs.build-jax.outputs.DOCKER_TAG_MEALKIT }}
          CONTAINER_NAME: equinox
          DOCKERFILE: .github/container/Dockerfile.equinox
          RUNNER_SIZE: small
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-known-hosts: ${{ vars.SSH_KNOWN_HOSTS }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          EXTRA_BUILD_ARGS: |
            URLREF_EQUINOX=${{ fromJson(inputs.SOURCE_URLREFS).EQUINOX }}

  build-maxtext:
    needs: build-jax
    runs-on: ${{ inputs.ARCHITECTURE == 'amd64' && 'linux-amd64-cpu16m' || 'linux-arm64-cpu16m' }}
    outputs:
      DOCKER_TAG_MEALKIT: ${{ steps.build-maxtext.outputs.DOCKER_TAG_MEALKIT }}
      DOCKER_TAG_FINAL:   ${{ steps.build-maxtext.outputs.DOCKER_TAG_FINAL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build MaxText container
        id: build-maxtext
        uses: ./.github/actions/build-container
        with:
          ARCHITECTURE: ${{ inputs.ARCHITECTURE }}
          ARTIFACT_NAME: artifact-maxtext-build
          BADGE_FILENAME: badge-maxtext-build
          BUILD_DATE: ${{ inputs.BUILD_DATE }}
          BASE_IMAGE: ${{ needs.build-jax.outputs.DOCKER_TAG_MEALKIT }}
          CONTAINER_NAME: maxtext
          DOCKERFILE: .github/container/Dockerfile.maxtext
          RUNNER_SIZE: small
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-known-hosts: ${{ vars.SSH_KNOWN_HOSTS }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          EXTRA_BUILD_ARGS: |
            URLREF_MAXTEXT=${{ fromJson(inputs.SOURCE_URLREFS).MAXTEXT }}

  build-torchax:
    needs: build-jax
    runs-on: ${{ inputs.ARCHITECTURE == 'amd64' && 'linux-amd64-cpu16m' || 'linux-arm64-cpu16m' }}
    outputs:
      DOCKER_TAG_MEALKIT: ${{ steps.build-torchax.outputs.DOCKER_TAG_MEALKIT }}
      DOCKER_TAG_FINAL:   ${{ steps.build-torchax.outputs.DOCKER_TAG_FINAL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build TorchAX container
        id: build-torchax
        uses: ./.github/actions/build-container
        with:
          ARCHITECTURE: ${{ inputs.ARCHITECTURE }}
          ARTIFACT_NAME: artifact-torchax-build
          BADGE_FILENAME: badge-torchax-build
          BUILD_DATE: ${{ inputs.BUILD_DATE }}
          BASE_IMAGE: ${{ needs.build-jax.outputs.DOCKER_TAG_MEALKIT }}
          CONTAINER_NAME: torchax
          DOCKERFILE: .github/container/Dockerfile.torchax
          RUNNER_SIZE: small
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-known-hosts: ${{ vars.SSH_KNOWN_HOSTS }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          EXTRA_BUILD_ARGS: |
            URLREF_TORCHAX=${{ fromJson(inputs.SOURCE_URLREFS).TORCHAX }}

  build-axlearn:
    needs: build-jax
    runs-on: ${{ inputs.ARCHITECTURE == 'amd64' && 'linux-amd64-cpu16m' || 'linux-arm64-cpu16m' }}
    outputs:
      DOCKER_TAG_MEALKIT: ${{ steps.build-axlearn.outputs.DOCKER_TAG_MEALKIT }}
      DOCKER_TAG_FINAL:   ${{ steps.build-axlearn.outputs.DOCKER_TAG_FINAL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build AxLearn container
        id: build-axlearn
        uses: ./.github/actions/build-container
        with:
          ARCHITECTURE: ${{ inputs.ARCHITECTURE }}
          ARTIFACT_NAME: artifact-axlearn-build
          BADGE_FILENAME: badge-axlearn-build
          BUILD_DATE: ${{ inputs.BUILD_DATE }}
          BASE_IMAGE: ${{ needs.build-jax.outputs.DOCKER_TAG_MEALKIT }}
          CONTAINER_NAME: axlearn
          DOCKERFILE: .github/container/Dockerfile.axlearn
          RUNNER_SIZE: large
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-known-hosts: ${{ vars.SSH_KNOWN_HOSTS }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          EXTRA_BUILD_ARGS: |
            URLREF_AXLEARN=${{ fromJson(inputs.SOURCE_URLREFS).AXLEARN }}

  build-alphafold:
    needs: build-jax
    runs-on: [self-hosted, "${{ inputs.ARCHITECTURE }}", "large"]
    outputs:
      DOCKER_TAG_MEALKIT: ${{ steps.build-alphafold.outputs.DOCKER_TAG_MEALKIT }}
      DOCKER_TAG_FINAL:  ${{ steps.build-alphafold.outputs.DOCKER_TAG_FINAL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build Alphafold container
        id: build-alphafold
        uses: ./.github/actions/build-container
        with:
          ARCHITECTURE: ${{ inputs.ARCHITECTURE }}
          ARTIFACT_NAME: artifact-alphafold-build
          BADGE_FILENAME: badge-alphafold-build
          BUILD_DATE: ${{ inputs.BUILD_DATE }}
          BASE_IMAGE: ${{ needs.build-jax.outputs.DOCKER_TAG_MEALKIT }}
          CONTAINER_NAME: alphafold
          DOCKERFILE: .github/container/Dockerfile.alphafold
          RUNNER_SIZE: large
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-known-hosts: ${{ vars.SSH_KNOWN_HOSTS }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          bazel-remote-cache-url: ${{ vars.BAZEL_REMOTE_CACHE_URL }}
          EXTRA_BUILD_ARGS: |
            URLREF_ALPHAFOLD=${{ fromJson(inputs.SOURCE_URLREFS).ALPHAFOLD }}

  collect-docker-tags:
    runs-on: ubuntu-22.04
    if: ${{ !cancelled() }}
    needs:
      - build-base
      - build-jax
      - build-equinox
      - build-maxtext
      - build-axlearn
      - build-alphafold
    outputs:
      TAGS: ${{ steps.collect-tags.outputs.TAGS }}
    steps:
      - name: Save docker tags as a JSON object
        id: collect-tags
        run: |
          TAGS=$(cat <<EOF | jq -c
          [\
            {"flavor": "base",         "stage": "final",   "priority": 800,  "tag": "${{ needs.build-base.outputs.DOCKER_TAG }}"},\
            {"flavor": "jax",          "stage": "final",   "priority": 1000, "tag": "${{ needs.build-jax.outputs.DOCKER_TAG_FINAL }}"},\
            {"flavor": "equinox",      "stage": "final",   "priority": 900,  "tag": "${{ needs.build-equinox.outputs.DOCKER_TAG_FINAL }}"},\
            {"flavor": "maxtext",      "stage": "final",   "priority": 900,  "tag": "${{ needs.build-maxtext.outputs.DOCKER_TAG_FINAL }}"},\
            {"flavor": "axlearn",      "stage": "final",   "priority": 900,  "tag": "${{ needs.build-axlearn.outputs.DOCKER_TAG_FINAL }}"},\
            {"flavor": "jax",          "stage": "mealkit", "priority": 500,  "tag": "${{ needs.build-jax.outputs.DOCKER_TAG_MEALKIT }}"},\
            {"flavor": "equinox",      "stage": "mealkit", "priority": 500,  "tag": "${{ needs.build-equinox.outputs.DOCKER_TAG_MEALKIT }}"},\
            {"flavor": "maxtext",      "stage": "mealkit", "priority": 500,  "tag": "${{ needs.build-maxtext.outputs.DOCKER_TAG_MEALKIT }}"},\
            {"flavor": "axlearn",      "stage": "mealkit", "priority": 500,  "tag": "${{ needs.build-axlearn.outputs.DOCKER_TAG_MEALKIT }}"},\
            {"flavor": "alphafold",    "stage": "mealkit", "priority": 500,  "tag": "${{ needs.build-alphafold.outputs.DOCKER_TAG_MEALKIT }}"},\
            {}\
          ]
          EOF
          )

          echo "TAGS=${TAGS}" >> $GITHUB_OUTPUT

  test-jax:
    needs: build-jax
    if: >-
      inputs.ARCHITECTURE == 'amd64' &&
      (
        inputs.MODE == 'full' ||
        inputs.MODE == 'jax'
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - test: backend-independent
            gpus: 1
          - test: single-gpu
            gpus: 1
          - test: multi-gpu
            gpus: 8
    runs-on: eks
    steps:
      - uses: actions/checkout@v4
      - name: Run eks-jobset action
        uses: ./.github/actions/eks-jobset
        with:
          NAME: jax-unit-${{ matrix.test }}
          NUM_GPUS: ${{ matrix.gpus }}
          IMAGE: ${{ needs.build-jax.outputs.DOCKER_TAG_FINAL }}
          COMMAND: |
            test-jax.sh -b ${{ matrix.test }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVCR_TOKEN: ${{ secrets.NVCR_TOKEN }}
          STATISTICS_SCRIPT: |
            NUM_ERRORS=\$(cat \${JOBSET_NAME}/*.log | grep -c 'ERROR:' || true);
            NUM_FAILED=\$(cat \${JOBSET_NAME}/*.log | grep -c 'FAILED in' || true);
            NUM_PASSED=\$(cat \${JOBSET_NAME}/*.log | grep -c 'PASSED in' || true);
            NUM_TESTS=\$((NUM_FAILED + NUM_PASSED));

  test-te:
    if: >-
      inputs.ARCHITECTURE == 'amd64' &&
      (
        inputs.MODE == 'full' ||
        inputs.MODE == 'te'
      )
    needs: build-jax
    strategy:
      fail-fast: false
      matrix:
        include:
          - test: L0_jax_unittest
            name: l0-unit
            nodes: 1
            gpus: 8
          - test: L0_jax_distributed_unittest
            name: l0-dist
            nodes: 1
            gpus: 8
    runs-on: gke-a3mega
    steps:
      - uses: actions/checkout@v4
      - name: Run XPK workload on cluster
        uses: ./.github/actions/gke-xpk
        with:
          NAME: te-${{ matrix.name }}
          NUM_NODES: ${{ matrix.nodes }}
          NUM_GPUS: ${{ matrix.gpus }}
          ENVS: |
            CUDNN_FRONTEND_CUDART_LIB_NAME=libcudart.so.13
          IMAGE: ${{ needs.build-jax.outputs.DOCKER_TAG_FINAL }}
          COMMAND: |
            set -xu -o pipefail;

            mkdir -p /opt/output;

            pip install pytest-reportlog pytest-xdist triton;
            nvidia-cuda-mps-control -d;
            export TE_PATH=\${SRC_PATH_TRANSFORMER_ENGINE};

            [[ ${{ matrix.test }} == *distributed* ]] && xdist_args=(8 1) || xdist_args=(1 4);
            pytest-xdist.sh \${xdist_args[@]} /opt/output/pytest-report.jsonl bash \${TE_PATH}/qa/${{ matrix.test }}/test.sh | tee /opt/output/pytest.log;
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVCR_TOKEN: ${{ secrets.NVCR_TOKEN }}
          STATISTICS_SCRIPT: |
            report_json=\${JOBSET_NAME}/pytest-report.jsonl;
            summary_line=\$(tail -n1 \${JOBSET_NAME}/pytest.log);
            NUM_ERRORS=\$(echo \$summary_line | grep -oE '[0-9]+ error' | awk '{print \$1} END { if (!NR) print 0}');
            NUM_PASSED=\$(cat \$report_json | jq -r 'select(.\"\$report_type\" == \"TestReport\" and .when == \"call\" and .outcome == \"passed\") | .outcome' | wc -l);
            NUM_FAILED=\$(cat \$report_json | jq -r 'select(.\"\$report_type\" == \"TestReport\" and .when == \"call\" and .outcome == \"failed\") | .outcome' | wc -l);
            NUM_TESTS=\$((NUM_FAILED + NUM_PASSED));

  test-nsys-jax-unit:
    if: >-
      inputs.ARCHITECTURE == 'amd64' &&
      (
        inputs.MODE == 'full' ||
        inputs.MODE == 'jax'
      )
    runs-on: gke-a3mega
    needs: build-jax
    strategy:
      fail-fast: false
      matrix:
        include:
          - nodes: 1
            gpus: 8
    steps:
      - uses: actions/checkout@v4
      - name: Run XPK workload on cluster
        uses: ./.github/actions/gke-xpk
        with:
          NAME: nsys-jax-unit
          NUM_NODES: ${{ matrix.nodes }}
          NUM_GPUS: ${{ matrix.gpus }}
          IMAGE: ${{ needs.build-jax.outputs.DOCKER_TAG_FINAL }}
          # nsys-jax is already installed, this is just adding the test dependencies
          # abuse knowledge that nsys-jax is installed editable, so the tests exist
          COMMAND: |
            pip install pytest-reportlog nsys-jax[test];
            test_path=\$(eval \$'python - <<\\\\PY\nimport importlib.resources\nprint(importlib.resources.files(\\\"nsys_jax\\\").joinpath(\\\"..\\\", \\\"tests\\\").resolve())\nPY');
            pytest --basetemp=/opt/output/pytest-tmp --report-log=/opt/output/pytest-report.jsonl \${test_path} | tee /opt/output/pytest.log;
            EXIT_CODE=${PIPESTATUS[0]};
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVCR_TOKEN: ${{ secrets.NVCR_TOKEN }}
          STATISTICS_SCRIPT: |
            report_json=\${JOBSET_NAME}/pytest-report.jsonl;
            summary_line=\$(tail -n1 \${JOBSET_NAME}/pytest.log);
            NUM_ERRORS=\$(echo \$summary_line | grep -oE '[0-9]+ error' | awk '{print \$1} END { if (!NR) print 0}');
            NUM_PASSED=\$(cat \${report_json} | jq -r 'select(.\"\$report_type\" == \"TestReport\" and .when == \"call\" and .outcome == \"passed\") | .outcome' | wc -l);
            NUM_FAILED=\$(cat \${report_json} | jq -r 'select(.\"\$report_type\" == \"TestReport\" and .when == \"call\" and .outcome == \"failed\") | .outcome' | wc -l);
            NUM_TESTS=\$(( NUM_PASSED + NUM_FAILED ))

  # test-nsys-jax generates several fresh .zip archive outputs by running nsys-jax with real GPU hardware; this test
  # runs on a regular GitHub Actions runner and checks that offline post-processing works in an environment that does
  # not already have nsys-jax installed
  test-nsys-jax-unit-archive:
    needs: test-nsys-jax-unit
    if: >-
      inputs.ARCHITECTURE == 'amd64' &&
      (
        inputs.MODE == 'full' ||
        inputs.MODE == 'jax'
      )
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macOS-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Download nsys-jax-unit output .zip files
      uses: actions/download-artifact@v8
      with:
        name: nsys-jax-unit
    - name: Extract archives and execute install scripts
      run: |
        pip install virtualenv # for install.sh
        for zip in $(ls *.zip); do
          ZIP="${PWD}/${zip}"
          pushd $(mktemp -d)
          unzip "${ZIP}"
          ls -l
          # TODO: verify this isn't needed, or make sure it isn't needed
          chmod 755 install.sh
          # Run the notebook with IPython, not Jupyter Lab, so it exits and prints something informative to stdout
          # Skip executing Jupyter lab
          NSYS_JAX_JUPYTER_EXECUTE_NOT_LAB=1 ./install.sh
          popd
        done

  test-nsys-jax-nccl:
    needs: build-jax
    if: >-
      inputs.ARCHITECTURE == 'amd64' &&
      (
        inputs.MODE == 'full' ||
        inputs.MODE == 'jax'
      )
    runs-on: gke-a3mega
    strategy:
      fail-fast: false
      matrix:
        include:
          - nodes: 2
            gpus: 8

    steps:
      - uses: actions/checkout@v4
      - name: Run XPK workload on cluster
        uses: ./.github/actions/gke-xpk
        with:
          NAME: nsys-jax-nccl
          NUM_NODES: ${{ matrix.nodes }}
          NUM_GPUS: ${{ matrix.gpus }}
          IMAGE: ${{ needs.build-jax.outputs.DOCKER_TAG_FINAL }}
          COMMAND: |
            nsys-jax \
              --output=/opt/output/nsys-rank\${NODE_RANK}.zip \
              -- \
              jax-nccl-test \
              --coordinator-address \${JAX_COORDINATOR_ADDRESS} \
              --distributed \
              --gpus-per-process=${{ matrix.gpus }} \
              --process-count=${{ matrix.nodes }} \
              --process-id=\${NODE_RANK};
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVCR_TOKEN: ${{ secrets.NVCR_TOKEN }}

  test-cutlass:
    needs: build-jax
    if: >-
      inputs.ARCHITECTURE == 'amd64' &&
      (
        inputs.MODE == 'full' ||
        inputs.MODE == 'jax-cutlass'
      )
    runs-on: gke-a3mega
    strategy:
      fail-fast: false
      matrix:
        include:
          - nodes: 1
            gpus: 8
    steps:
      - uses: actions/checkout@v4
      - name: Run XPK workload on cluster
        uses: ./.github/actions/gke-xpk
        with:
          NAME: jax-cutlass
          NUM_NODES: ${{ matrix.nodes }}
          NUM_GPUS: ${{ matrix.gpus }}
          IMAGE: ${{ needs.build-jax.outputs.DOCKER_TAG_FINAL }}
          COMMAND: |
            pip install pytest-reportlog pytest-xdist flatbuffers;
            git clone -b main --single-branch --depth 1 https://github.com/NVIDIA/cutlass.git /cutlass;
            nvidia-cuda-mps-control -d;

            any_failed=0;
            for f in /cutlass/examples/python/CuTeDSL/dsl_tutorials/jax/*.py; do
              echo [Executing] \${f};
              log_output=\$(python \${f} 2>&1);
              exit_code=\${?};
              if [[ \${exit_code} -ne 0 ]]; then any_failed=1; fi;

              outcome=\$( [ \${exit_code} -eq 0 ] && echo passed || echo failed );
              echo === \${f} === | tee -a /opt/output/pytest_stdout.log;
              echo \${log_output} | tee -a /opt/output/pytest_stdout.log;
              eval \$'python3 - \\\"\${outcome}\\\" \\\"\${f}\\\" \\\"\${log_output}\\\" >> /opt/output/pytest-report.jsonl <<\\\\PY\nimport json\nimport sys\nprint(json.dumps({\\\"outcome\\\": sys.argv[1], \\\"nodeid\\\": sys.argv[2], \\\"longrepr\\\": sys.argv[3]}))\nPY';
            done;
            if [[ \${any_failed} -ne 0 ]]; then false; else true; fi;

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVCR_TOKEN: ${{ secrets.NVCR_TOKEN }}
          STATISTICS_SCRIPT: |
            NUM_ERRORS=0;
            NUM_PASSED=\$(cat \${JOBSET_NAME}/pytest-report.jsonl | jq --slurp | jq '.[] | select(.outcome == \"passed\") | .outcome' | wc -l || true);
            NUM_FAILED=\$(cat \${JOBSET_NAME}/pytest-report.jsonl | jq --slurp | jq '.[] | select(.outcome == \"failed\") | .outcome' | wc -l || true);
            NUM_TESTS=\$(( NUM_PASSED + NUM_FAILED ));

  test-maxtext:
    needs: build-maxtext
    if: >-
      inputs.ARCHITECTURE == 'amd64' &&
      (
        inputs.MODE == 'full' ||
        inputs.MODE == 'maxtext'
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - test: single-node
            nodes: 1
            gpus: 8
            pipeline-parallel: 1
            data-parallel: 1
            fsdp: 2
            tensor-parallel: 4
            envs: |-
              NCCL_NET_PLUGIN=none
              NCCL_NET=Socket
            maxtext-args: |-
              skip_jax_distributed_system=true
          - test: multi-node
            nodes: 2
            gpus: 8
            pipeline-parallel: 1
            data-parallel: 4
            fsdp: 2
            tensor-parallel: 2
            envs: |-
              OFI_NCCL_PROTOCOL=SENDRECV
            maxtext-args: |-
              jax_distributed_initialization_timeout=60
    runs-on: eks
    steps:
      - uses: actions/checkout@v4
      - name: Run eks-jobset action
        uses: ./.github/actions/eks-jobset
        with:
          NAME: maxtext-${{ matrix.test }}
          NUM_NODES: ${{ matrix.nodes }}
          NUM_GPUS: ${{ matrix.gpus }}
          IMAGE: ${{ needs.build-maxtext.outputs.DOCKER_TAG_FINAL }}
          ENVS: |
            ${{ matrix.envs }}
          COMMAND: |
            test-maxtext.sh \
              --output /opt/output \
              --batch-per-gpu 2 \
              --steps 10 \
              --model-name=llama2-7b \
              --attn-type cudnn_flash_te \
              --remat-policy=minimal_with_context \
              --pipeline-parallel ${{ matrix.pipeline-parallel }} \
              --data-parallel ${{ matrix.data-parallel }} \
              --fsdp ${{ matrix.fsdp }} \
              --tensor-parallel ${{ matrix.tensor-parallel }} \
              --nodes ${{ matrix.nodes }} \
              -a 'scan_layers=false
                  max_target_length=1024
                  use_iota_embed=true
                  logits_dot_in_fp32=false
                  max_segments_per_seq=32
                  ${{ matrix.maxtext-args }}
                  '
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVCR_TOKEN: ${{ secrets.NVCR_TOKEN }}

  test-maxtext-gke:
    needs: build-maxtext
    if: >-
      inputs.ARCHITECTURE == 'amd64' &&
      (
        inputs.MODE == 'full' ||
        inputs.MODE == 'maxtext'
      )
    uses: ./.github/workflows/_test_maxtext_gke_xpk.yaml
    with:
      MAXTEXT_IMAGE: ${{ needs.build-maxtext.outputs.DOCKER_TAG_FINAL }}
    secrets: inherit

  test-axlearn-eks:
    needs: build-axlearn
    if: >-
      inputs.ARCHITECTURE == 'amd64' &&
      (
        inputs.MODE == 'full' ||
        inputs.MODE == 'axlearn'
      )
    runs-on: eks
    steps:
      - uses: actions/checkout@v4
      - name: Run eks-jobset action
        uses: ./.github/actions/eks-jobset
        with:
          NAME: axlearn-unit
          NUM_GPUS: 8
          IMAGE: ${{ needs.build-axlearn.outputs.DOCKER_TAG_FINAL }}
          COMMAND: |
            pip install pytest-reportlog pytest-xdist;
            LOG_DIR=/opt/output;
            mkdir -p \${LOG_DIR};
            pytest-xdist.sh 8 4 \${LOG_DIR}/axlearn-unittests.jsonl test-axlearn.sh --directory . --output \${LOG_DIR} --test-files '/opt/axlearn/axlearn/common/*_test.py'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVCR_TOKEN: ${{ secrets.NVCR_TOKEN }}
          STATISTICS: true
          STATISTICS_SCRIPT: |
            summary_file=\${JOBSET_NAME}/logs/summary.txt;
            NUM_ERRORS=0;
            NUM_PASSED=\$(grep -Eo 'PASSED:[[:space:]]*[0-9]+' \${summary_file} | grep -Eo '[0-9]+' || echo 0);
            NUM_FAILED=\$(grep -Eo 'FAILED:[[:space:]]*[0-9]+' \${summary_file} | grep -Eo '[0-9]+' || echo 0);
            NUM_SKIPPED=\$(grep -Eo 'SKIPPED:[[:space:]]*[0-9]+' \${summary_file} | grep -Eo '[0-9]+' || echo 0);
            NUM_TESTS=\$((NUM_FAILED + NUM_PASSED + NUM_SKIPPED));

  test-axlearn-fuji-models-eks:
    needs: build-axlearn
    if: >-
      inputs.ARCHITECTURE == 'amd64' &&
      (
        inputs.MODE == 'full' ||
        inputs.MODE == 'axlearn'
      )
    runs-on: eks
    steps:
      - uses: actions/checkout@v4
      - name: Run eks-jobset action
        uses: ./.github/actions/eks-jobset
        with:
          NAME: axlearn-fuji-3b
          NUM_GPUS: 8
          IMAGE: ${{ needs.build-axlearn.outputs.DOCKER_TAG_FINAL }}
          ENVS: |
            OFI_NCCL_PROTOCOL=SENDRECV
          COMMAND: |
            CONFIG=fuji-3B-v3-flash;
            LOG_DIR=/opt/output;
            TRAINER_DIR=\${LOG_DIR}/\${CONFIG}-eks/trainer-dir;
            mkdir -p \${TRAINER_DIR};
            OUTPUT_LOG_FILE=\${TRAINER_DIR}/output.log;
            python3 /usr/local/bin/fuji-train-perf.py --module=text.gpt.c4_trainer --config=\${CONFIG} --jax_backend=gpu --trainer_dir=\${TRAINER_DIR} --data_dir=gs://axlearn-public/tensorflow_datasets --ici_fsdp=8 --dcn_dp=1 --gbs=16 --ga=1 --seq_len=4096 --max_step=301 --save_checkpoint_steps=100 --write_summary_steps=100 --output_log_file=\${OUTPUT_LOG_FILE} --world_size=8
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVCR_TOKEN: ${{ secrets.NVCR_TOKEN }}

  test-alphafold-inference:
    needs: build-alphafold
    if: >-
      inputs.ARCHITECTURE == 'amd64' &&
      (
        inputs.MODE == 'full' ||
        inputs.MODE == 'alphafold'
      )
    runs-on: eks
    steps:
      - uses: actions/checkout@v4
      - name: Run eks-jobset action
        uses: ./.github/actions/eks-jobset
        with:
          NAME: alphafold-inference
          NUM_GPUS: 1
          IMAGE: ${{ needs.build-alphafold.outputs.DOCKER_TAG_FINAL }}
          COMMAND: |
            set -e;

            python -c 'from alphafold3.build_data import build_data; build_data()';

            python /usr/local/bin/generate_af_parameters.py \
              --input-parameters-file /opt/alphafold_input_data/model_parameters.md \
              --out-model-dir /opt/alphafold/model;

            python /usr/local/bin/af3_inference_benchmark.py \
              --input-json-path /opt/alphafold_input_data/input_sequences/bench_L00512.json \
              --model-dir /opt/alphafold/model \
              --output-json /opt/output/output.json
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVCR_TOKEN: ${{ secrets.NVCR_TOKEN }}
          STATISTICS: true
