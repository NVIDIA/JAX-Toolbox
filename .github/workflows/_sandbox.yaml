name: "~Sandbox"

on:
  workflow_dispatch:

jobs:
  t5x-multi-gpu:
    strategy:
      matrix:
        include:
          - TEST_NAME: ["1P1G", "1P2G", "1P4G"]
            N_GPU: [1, 2, 4]
            ADDITIONAL_ARGS: ""
          # - TEST_NAME: ["1P8G"]
          #   N_GPU: [8]
          # - TEST_NAME: ["1P1G_fmha", "1P2G_fmha"]
          #   N_GPU: [1,2]
          #   ADDITIONAL_ARGS: "--enable-fmha 1"
      fail-fast: false

    runs-on: ubuntu-22.04

    steps:
      - name: Check concatination
        run: |
          TEST_CASE_NAME=join(${{ matrix.TEST_NAME[] }}, '_')
          echo $TEST_CASE_NAME

