name: "~Sandbox"

on:
  workflow_dispatch:
    inputs:
      JAX_VLLM_OFFLOADING_IMAGE:
        type: string
        description: JIO image to smoke test
        default: ghcr.io/nvidia/jax-toolbox-internal:26901322130-jio-amd64
        required: false

jobs:
  jio-single-controller-smoke:
    runs-on: gke-a3mega
    steps:
      - uses: actions/checkout@v6

      - name: Run JIO single-controller smoke
        uses: ./.github/actions/gke-xpk
        with:
          NAME: jio-sc-smoke
          IMAGE: ${{ inputs.JAX_VLLM_OFFLOADING_IMAGE }}
          NUM_NODES: 1
          ENVS: |
            CUDA_VISIBLE_DEVICES=0,1,2,3;
            MODEL_NAME=meta-llama/Llama-3.2-1B-Instruct;
            NCCL_CUMEM_ENABLE=0;
          COMMAND: |
            set -x;
            cd /opt/jtbx/jax-inference-offloading/examples/single_controller;
            timeout --kill-after=10s 120s bash ./run_single_controller.sh \
              --mode=sync \
              --model-path=/Llama-3.2-1B-Instruct \
              --param-mapping-path=../mappings/llama3_1b_param_mapping.json \
              --num-iterations=1 \
              --transfer-mode=grouped \
              --n-gpus-vllm=2 \
              --n-gpus-jax=2 \
              --vllm-enforce-eager \
              --vllm-gpu-memory-utilization=0.7 \
              --output-dir=/opt/output/jio-single-controller;
            EXIT_CODE=$?;
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVCR_TOKEN: ${{ secrets.NVCR_TOKEN }}
