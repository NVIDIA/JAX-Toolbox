name: EKS JobSet

on:
 push:
    branches:
      - aybchan/eks-jobset-test

permissions:
  contents: read        # to fetch code
  actions:  write       # to cancel previous workflows
  packages: write       # to upload containers

jobs:
  test-nsys-jax-nccl:
    runs-on: eks
    strategy:
      fail-fast: false
      matrix:
        include:
          - nodes: 2
            gpus: 8
            
    steps:
      - uses: actions/checkout@v4
      - name: Run eks-jobset action
        uses: ./.github/actions/eks-jobset
        with:
          NAME: nsys-jax-nccl
          NUM_NODES: ${{ matrix.nodes }}
          NUM_GPUS: ${{ matrix.gpus }}
          IMAGE: ghcr.io/nvidia/jax-toolbox-internal:25104098695-jax-amd64
          COMMAND: |
            nsys-jax \
              --output=/opt/output/nsys-rank\${NODE_RANK}.zip \
              -- \
              jax-nccl-test \
              --coordinator-address \${JAX_COORDINATOR_ADDRESS} \
              --distributed \
              --gpus-per-process=${{ matrix.gpus }} \
              --process-count=${{ matrix.nodes }} \
              --process-id=\${NODE_RANK}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVCR_TOKEN: ${{ secrets.NVCR_TOKEN }}

  test-cutlass:
    runs-on: eks
    strategy:
      fail-fast: false
      matrix:
        include:
          - nodes: 1
            gpus: 8
            
    steps:
      - uses: actions/checkout@v4
      - name: Run eks-jobset action
        uses: ./.github/actions/eks-jobset
        with:
          NAME: jax-cutlass
          NUM_NODES: ${{ matrix.nodes }}
          NUM_GPUS: ${{ matrix.gpus }}
          IMAGE: ghcr.io/nvidia/jax-toolbox-internal:25104098695-jax-amd64
          COMMAND: |
            pip install pytest-reportlog pytest-xdist flatbuffers;
            CUTEDSL_VERSION=\$(python -c 'import cutlass; print(cutlass.__version__);');
            git clone -b v\${CUTEDSL_VERSION} --single-branch --depth 1 https://github.com/NVIDIA/cutlass.git /cutlass;
            NGPUS=\$(nvidia-smi --list-gpus | wc -l);
            nvidia-cuda-mps-control -d;
            
            for f in /cutlass/examples/python/CuTeDSL/jax/*.py; do
              echo \"[Executing] \${f}\";
              log_output=\$(python \${f} 2>&1);
              exit_code=\${?};
              outcome=\$( [ \${exit_code} -eq 0 ] && echo \"passed\" || echo \"failed\" );
              echo \"=== \${f} ===\" | tee -a /opt/output/pytest_stdout.log;
              echo \"\${log_output}\" | tee -a /opt/output/pytest_stdout.log;
              python3 -c \"import json,sys; print(json.dumps({'outcome': sys.argv[1], 'nodeid': sys.argv[2], 'longrepr': sys.argv[3]}))\" \"\${outcome}\" \"\${f}\" \"\${log_output}\" >> /opt/output/pytest-report.jsonl;
            done
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVCR_TOKEN: ${{ secrets.NVCR_TOKEN }}
          STATISTICS: true
          STATISTICS_SCRIPT: |
            NUM_ERRORS=0;
            NUM_PASSED=\$(cat \${JOBSET_NAME}/pytest-report.jsonl | jq --slurp | jq '.[] | select(.outcome == \"passed\") | .outcome' | wc -l || true);
            NUM_FAILED=\$(cat \${JOBSET_NAME}/pytest-report.jsonl | jq --slurp | jq '.[] | select(.outcome == \"failed\") | .outcome' | wc -l || true);
            NUM_TESTS=\$(( NUM_PASSED + NUM_FAILED ));

