apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: jobset
  labels:
    kueue.x-k8s.io/queue-name: p5-queue
spec:
  failurePolicy:
    maxRestarts: 4
  replicatedJobs:
    - name: slice
      replicas: 1
      template:
        spec:
          parallelism: 1
          completions: 1
          backoffLimit: 0
          template:
            spec:
              serviceAccountName: jax-job-sa
              hostNetwork: true
              dnsPolicy: ClusterFirstWithHostNet
              containers:
                - name: maxtext
                  image: ghcr.io/nvidia/jax:maxtext
                  command:
                    - bash
                    - -c 
                    - |
                      nvidia-smi
                      test-maxtext.sh
                  resources:
                    limits:
                      nvidia.com/gpu: 8
                      vpc.amazonaws.com/efa: 32
