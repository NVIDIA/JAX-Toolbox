apiVersion: batch/v1
kind: Job
metadata:
    name: PLACEHOLDER
    labels:
        kueue.x-k8s.io/queue-name: p5-queue
        kueue.x-k8s.io/max-exec-time-seconds: "10800"
spec:
    template:
        spec:
            restartPolicy: Never
            containers:
                - name: jax
                  image: PLACEHOLDER
                  command:
                    - bash
                    - -c
                    - |
                      set -exo pipefail

                      LOG_DIR="/output/${RUN_ID}"
                      mkdir -p ${LOG_DIR}

                      # backend-independent tests
                      test-jax.sh -b backend-independent 2>&1 | tee ${LOG_DIR}/test-backend-independent.log

                      # single-gpu tests
                      nvidia-cuda-mps-control -d
                      test-jax.sh -b single-gpu 2>&1 | tee ${LOG_DIR}/test-single-gpu.log

                      # multi-gpu tests
                      test-jax.sh -b multi-gpu 2>&1 | tee ${LOG_DIR}/test-multi-gpu.log
                  env:
                    - name: RUN_ID
                      value: PLACEHOLDER
                  resources:
                    limits:
                        nvidia.com/gpu: 8
                  volumeMounts:
                    - name: s3-storage
                      mountPath: /output
                      subPath: jax
            imagePullSecrets:
                - name: PLACEHOLDER
            volumes:
                - name: s3-storage
                  persistentVolumeClaim:
                    claimName: s3-pvc
