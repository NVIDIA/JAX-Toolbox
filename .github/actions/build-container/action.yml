name: Build container

description: "Builds a Docker container image for JAX-based projects using NVIDIA's Mealkit and uploads it to GitHub Container Registry."

inputs:
  ARCHITECTURE:
    description: 'CPU architecture to build the image for, e.g. amd64, arm64'
    required: true
  BASE_IMAGE:
    description: 'Base docker image that provides JAX'
    required: false
    default: ghcr.io/nvidia/jax:mealkit
  BUILD_DATE:
    description: "Build date in YYYY-MM-DD format"
    required: false
    default: 'NOT SPECIFIED'
  ARTIFACT_NAME:
    description: 'Name of the artifact zip file, e.g. artifact-maxtext-build'
    required: true
  BADGE_FILENAME:
    description: 'Name of the endpoint JSON file for shields.io badge, e.g. badge-maxtext-build'
    required: true
  CONTAINER_NAME:
    description: "Container name, e.g. maxtext"
    required: true
  DOCKERFILE:
    description: "Dockerfile to use, e.g. .github/container/Dockerfile.maxtext"
    required: true
  DOCKER_CONTEXT:
    description: "Dockerfile context to build"
    default: '.github/container'
    required: false
  RUNNER_SIZE:
    description: "Size of the runner to use"
    required: false
    default: small
  EXTRA_BUILD_ARGS:
    description: "Extra build arguments to pass to the Docker build"
    required: false
    default: ""
  ssh-private-key:
    description: "SSH private key to use for building the image"
    required: true
    default: ""
  ssh-known-hosts:
    description: "SSH known hosts entries to use for building the image"
    required: true
    default: ""
  github-token:
    description: "GitHub token to use for authentication"
    required: true
    default: ""
  bazel-remote-cache-url:
    description: "URL of the Bazel cache (remote URL or in-container path)"
    required: false
    default: ""
  bazel-repo-cache-path:
    description: "Host path used to seed/store Bazel repository cache"
    required: false
    default: ""
  bazel-save-cache:
    description: "Whether to export Bazel caches from the build back to the host paths"
    required: false
    default: "false"

outputs:
  DOCKER_TAG_MEALKIT:
    description: "Tags of the 'mealkit' image built"
    value: ${{ steps.export.outputs.DOCKER_TAG_MEALKIT }}
  DOCKER_TAG_FINAL:
    description: "Tags of the complete image built"
    value: ${{ steps.export.outputs.DOCKER_TAG_FINAL }}

runs:
  using: 'composite'
  steps:
    - name: Set up environment variables
      shell: bash
      id: set-env
      run: |
        echo 'UPLD_IMAGE=ghcr.io/nvidia/jax-toolbox-internal' >> $GITHUB_ENV
        echo "BADGE_FILENAME_FULL=${{ inputs.BADGE_FILENAME }}-${{ inputs.ARCHITECTURE }}.json" >> $GITHUB_ENV
        echo "BAZEL_EXPORT_DIR=${RUNNER_TEMP}/bazel-cache-export" >> $GITHUB_ENV
        echo "BAKE_FILE=${RUNNER_TEMP}/docker-bake.json" >> $GITHUB_ENV
        echo "BUILDX_GHA_SCOPE=${{ inputs.CONTAINER_NAME }}-${{ inputs.ARCHITECTURE }}" >> $GITHUB_ENV

    - name: Prepare Bazel cache contexts
      shell: bash
      run: |
        repo_context="${{ inputs.bazel-repo-cache-path }}"
        if [[ -z "${repo_context}" ]]; then
          repo_context="$(mktemp -d)"
        fi
        mkdir -p "${repo_context}"
        rm -rf "${RUNNER_TEMP}/bazel-cache-export"
        echo "BAZEL_REPO_CONTEXT=${repo_context}" >> $GITHUB_ENV

    - name: Setup SSH
      id: setup-ssh
      uses: ./.github/actions/setup-ssh
      with:
        ssh-private-key: ${{ inputs.ssh-private-key }}
        ssh-known-hosts: ${{ inputs.ssh-known-hosts }}

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ inputs.github-token }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: |
          image=moby/buildkit:v0.12.1
        version: v0.30.1

    # MEALKIT BUILD
    - name: Set docker metadata - mealkit
      id: mealkit-metadata
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.UPLD_IMAGE }}
        flavor: |
          latest=false
        tags: |
          type=raw,value=${{ github.run_id }}-${{ inputs.CONTAINER_NAME }}-${{ inputs.ARCHITECTURE }}-mealkit
        labels:
          org.opencontainers.image.created=${{ inputs.BUILD_DATE }}

    # FINAL IMAGE BUILD
    - name: Set docker metadata - final
      id: final-metadata
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.UPLD_IMAGE }}
        flavor: |
          latest=false
        tags: |
          type=raw,value=${{ github.run_id }}-${{ inputs.CONTAINER_NAME }}-${{ inputs.ARCHITECTURE }}
        labels:
          org.opencontainers.image.created=${{ inputs.BUILD_DATE }}

    - name: Generate docker-bake definition
      shell: bash -euo pipefail {0}
      env:
        MEALKIT_TAGS: ${{ steps.mealkit-metadata.outputs.tags }}
        FINAL_TAGS: ${{ steps.final-metadata.outputs.tags }}
        MEALKIT_LABELS: ${{ steps.mealkit-metadata.outputs.labels }}
        FINAL_LABELS: ${{ steps.final-metadata.outputs.labels }}
        DOCKER_CONTEXT: ${{ inputs.DOCKER_CONTEXT }}
        DOCKERFILE: ${{ inputs.DOCKERFILE }}
        ARCHITECTURE: ${{ inputs.ARCHITECTURE }}
        BASE_IMAGE: ${{ inputs.BASE_IMAGE }}
        BAZEL_CACHE: ${{ inputs.bazel-remote-cache-url }}
        BUILD_DATE: ${{ inputs.BUILD_DATE }}
        EXTRA_BUILD_ARGS: ${{ inputs.EXTRA_BUILD_ARGS }}
        BAZEL_REPO_CONTEXT: ${{ env.BAZEL_REPO_CONTEXT }}
        SSH_KNOWN_HOSTS_FILE: ${{ steps.setup-ssh.outputs.known-hosts-file }}
        BAZEL_EXPORT_DIR: ${{ env.BAZEL_EXPORT_DIR }}
        BUILDX_GHA_SCOPE: ${{ env.BUILDX_GHA_SCOPE }}
        BAKE_FILE: ${{ env.BAKE_FILE }}
      run: |
        lines_to_array() {
          printf '%s\n' "$1" | sed '/^$/d' | jq -R . | jq -s .
        }

        kv_lines_to_object() {
          printf '%s\n' "$1" | sed '/^$/d' | jq -Rn '
            [inputs | select(length > 0) | split("=") | {(.[0]): (.[1:] | join("="))}] | add // {}
          '
        }

        mealkit_tags_json="$(lines_to_array "${MEALKIT_TAGS}")"
        final_tags_json="$(lines_to_array "${FINAL_TAGS}")"
        mealkit_labels_json="$(kv_lines_to_object "${MEALKIT_LABELS}")"
        final_labels_json="$(kv_lines_to_object "${FINAL_LABELS}")"
        extra_build_args_json="$(kv_lines_to_object "${EXTRA_BUILD_ARGS}")"
        context_prefix="${DOCKER_CONTEXT%/}/"
        dockerfile_path="${DOCKERFILE}"
        if [[ "${dockerfile_path}" == "${context_prefix}"* ]]; then
          dockerfile_path="${dockerfile_path#${context_prefix}}"
        fi

        build_args_json="$(
          jq -n \
            --arg base_image "${BASE_IMAGE}" \
            --arg build_date "${BUILD_DATE}" \
            --arg bazel_cache "${BAZEL_CACHE}" \
            --argjson extra_args "${extra_build_args_json}" \
            '
            {BASE_IMAGE: $base_image, BUILD_DATE: $build_date}
            + (if $bazel_cache != "" then {BAZEL_CACHE: $bazel_cache} else {} end)
            + $extra_args
            '
        )"

        jq -n \
          --arg context "${DOCKER_CONTEXT}" \
          --arg dockerfile "${dockerfile_path}" \
          --arg architecture "${ARCHITECTURE}" \
          --arg bazel_repo_context "${BAZEL_REPO_CONTEXT}" \
          --arg ssh_known_hosts_file "${SSH_KNOWN_HOSTS_FILE}" \
          --arg bazel_export_dir "${BAZEL_EXPORT_DIR}" \
          --arg cache_scope "${BUILDX_GHA_SCOPE}" \
          --argjson build_args "${build_args_json}" \
          --argjson mealkit_tags "${mealkit_tags_json}" \
          --argjson final_tags "${final_tags_json}" \
          --argjson mealkit_labels "${mealkit_labels_json}" \
          --argjson final_labels "${final_labels_json}" \
          '
          def common:
            {
              context: $context,
              dockerfile: $dockerfile,
              platforms: [("linux/" + $architecture)],
              contexts: {bazel_repo: $bazel_repo_context},
              ssh: ["default"],
              secret: [("id=SSH_KNOWN_HOSTS,src=" + $ssh_known_hosts_file)],
              args: $build_args,
              "cache-from": [("type=gha,scope=" + $cache_scope)]
            };

          {
            target: {
              mealkit: (
                common
                + {
                    target: "mealkit",
                    tags: $mealkit_tags,
                    labels: $mealkit_labels,
                    output: ["type=image,push=true"]
                  }
              ),
              final: (
                common
                + {
                    target: "final",
                    tags: $final_tags,
                    labels: $final_labels,
                    output: ["type=image,push=true"],
                    "cache-to": [("type=gha,mode=max,scope=" + $cache_scope + ",ignore-error=true")]
                  }
              ),
              "cache-export": (
                common
                + {
                    target: "cache-export",
                    output: [("type=local,dest=" + $bazel_export_dir)]
                  }
              )
            }
          }
          ' > "${BAKE_FILE}"

    - name: Build mealkit/final and optionally export Bazel caches
      id: final-build
      uses: docker/bake-action@v5
      with:
        files: ${{ env.BAKE_FILE }}
        targets: |
          mealkit
          final
          ${{ inputs.bazel-save-cache == 'true' && 'cache-export' || '' }}
        allow: |
          ssh

    - name: Resolve final image digest
      id: final-digest
      if: ${{ success() }}
      shell: bash -euo pipefail {0}
      env:
        FINAL_TAGS: ${{ steps.final-metadata.outputs.tags }}
      run: |
        final_tag="$(printf '%s\n' "${FINAL_TAGS}" | sed '/^$/d' | head -n1)"
        digest="$(docker buildx imagetools inspect "${final_tag}" --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"' || true)"
        if [[ -z "${digest}" || "${digest}" == "null" ]]; then
          digest="unknown"
        fi
        echo "digest=${digest}" >> "$GITHUB_OUTPUT"

    - name: Copy exported Bazel caches to host
      if: ${{ inputs.bazel-save-cache == 'true' && success() }}
      shell: bash -euo pipefail {0}
      run: |
        if [[ -d "${{ env.BAZEL_EXPORT_DIR }}/bazel-repo" && -n "${{ inputs.bazel-repo-cache-path }}" ]]; then
          mkdir -p "${{ inputs.bazel-repo-cache-path }}"
          cp -a "${{ env.BAZEL_EXPORT_DIR }}/bazel-repo/." "${{ inputs.bazel-repo-cache-path }}/"
        fi

    # SITREP GENERATION
    - name: Generate sitrep
      if: "!cancelled()"
      shell: bash -x -e {0}
      run: |
        # bring in utility functions
        source .github/workflows/scripts/to_json.sh

        badge_label='${{ inputs.CONTAINER_NAME }} ${{ inputs.ARCHITECTURE }} build'
        tags="${{ steps.final-metadata.outputs.tags }}"
        digest="${{ steps.final-digest.outputs.digest }}"
        outcome="${{ steps.final-build.outcome }}"

        if [[ ${outcome} == "success" ]]; then
          badge_message="pass"
          badge_color=brightgreen
          summary="${{ inputs.CONTAINER_NAME }} build on ${{ inputs.ARCHITECTURE }}: $badge_message"
        else
          badge_message="fail"
          badge_color=red
          summary="${{ inputs.CONTAINER_NAME }} build on ${{ inputs.ARCHITECTURE }}: $badge_message"
        fi

        to_json \
          summary \
          badge_label tags digest outcome \
        > sitrep.json

        schemaVersion=1 \
        label="${badge_label}" \
        message="${badge_message}" \
        color="${badge_color}" \
        to_json schemaVersion label message color \
        > ${{ env.BADGE_FILENAME_FULL }}

    - name: Upload sitrep and badge
      if: "!cancelled()"
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.ARTIFACT_NAME }}-${{ inputs.ARCHITECTURE }}
        path: |
          sitrep.json
          ${{ env.BADGE_FILENAME_FULL }}

    - name: Export outputs
      id: export
      shell: bash
      run: |
        echo "DOCKER_TAG_MEALKIT=${{ steps.mealkit-metadata.outputs.tags }}" >> "$GITHUB_OUTPUT"
        echo "DOCKER_TAG_FINAL=${{ steps.final-metadata.outputs.tags }}"     >> "$GITHUB_OUTPUT"
