name: Build container

description: "Builds a Docker container image for JAX-based projects using NVIDIA's Mealkit and uploads it to GitHub Container Registry."

inputs:
  ARCHITECTURE:
    description: 'CPU architecture to build the image for, e.g. amd64, arm64'
    required: true
  BASE_IMAGE:
    description: 'Base docker image that provides JAX'
    required: false
    default: ghcr.io/nvidia/jax:mealkit
  BUILD_DATE:
    description: "Build date in YYYY-MM-DD format"
    required: false
    default: 'NOT SPECIFIED'
  ARTIFACT_NAME:
    description: 'Name of the artifact zip file, e.g. artifact-maxtext-build'
    required: true
  BADGE_FILENAME:
    description: 'Name of the endpoint JSON file for shields.io badge, e.g. badge-maxtext-build'
    required: true
  CONTAINER_NAME:
    description: "Container name, e.g. maxtext"
    required: true
  DOCKERFILE:
    description: "Dockerfile to use, e.g. .github/container/Dockerfile.maxtext"
    required: true
  DOCKER_CONTEXT:
    description: "Dockerfile context to build"
    default: '.github/container'
    required: false
  RUNNER_SIZE:
    description: "Size of the runner to use"
    required: false
    default: small
  EXTRA_BUILD_ARGS:
    description: "Extra build arguments to pass to the Docker build"
    required: false
    default: ""
  ssh-private-key:
    description: "SSH private key to use for building the image"
    required: true
    default: ""
  ssh-known-hosts:
    description: "SSH known hosts entries to use for building the image"
    required: true
    default: ""
  github-token:
    description: "GitHub token to use for authentication"
    required: true
    default: ""
  bazel-remote-cache-url:
    description: "URL of the Bazel cache endpoint to use when disk cache is disabled"
    required: false
    default: ""
  ENABLE_BAZEL_DISK_CACHE:
    description: "Enable Bazel disk cache via actions/cache"
    required: false
    default: "false"
  ENABLE_BAZEL_REPO_CACHE:
    description: "Enable Bazel repository cache via actions/cache"
    required: false
    default: "false"
  docker-build-allow:
    description: "Optional BuildKit entitlements to allow during docker/build-push-action"
    required: false
    default: ""
  docker-build-network:
    description: "Network mode to use for docker/build-push-action"
    required: false
    default: "default"

outputs:
  DOCKER_TAG_MEALKIT:
    description: "Tags of the 'mealkit' image built"
    value: ${{ steps.export.outputs.DOCKER_TAG_MEALKIT }}
  DOCKER_TAG_FINAL:
    description: "Tags of the complete image built"
    value: ${{ steps.export.outputs.DOCKER_TAG_FINAL }}

runs:
  using: 'composite'
  steps:
    - name: Set up environment variables
      shell: bash
      id: set-env
      run: |
        echo 'UPLD_IMAGE=ghcr.io/nvidia/jax-toolbox-internal' >> $GITHUB_ENV
        echo "BADGE_FILENAME_FULL=${{ inputs.BADGE_FILENAME }}-${{ inputs.ARCHITECTURE }}.json" >> $GITHUB_ENV
        if [[ "${{ inputs.ENABLE_BAZEL_DISK_CACHE }}" == "true" ]]; then
          echo 'BAZEL_CACHE_VALUE=/cache/bazel-disk' >> "$GITHUB_ENV"
        else
          echo 'BAZEL_CACHE_VALUE=${{ inputs.bazel-remote-cache-url }}' >> "$GITHUB_ENV"
        fi

    - name: Resolve Bazel cache metadata
      id: bazel-cache-metadata
      shell: bash
      env:
        CACHE_BRANCH_RAW: ${{ github.head_ref || github.ref_name }}
      run: |
        branch="${CACHE_BRANCH_RAW:-detached}"
        branch="$(printf '%s' "${branch}" | sed -E 's/[^A-Za-z0-9._-]+/-/g')"
        echo "branch=${branch}" >> "$GITHUB_OUTPUT"
        {
          echo "build_contexts<<EOF"
          if [[ "${{ inputs.ENABLE_BAZEL_DISK_CACHE }}" == "true" ]]; then
            echo "bazel-disk-seed=/tmp/bazel-disk-cache"
          fi
          if [[ "${{ inputs.ENABLE_BAZEL_REPO_CACHE }}" == "true" ]]; then
            echo "bazel-repo-seed=/tmp/bazel-repo-cache"
          fi
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Setup SSH
      id: setup-ssh
      uses: ./.github/actions/setup-ssh
      with:
        ssh-private-key: ${{ inputs.ssh-private-key }}
        ssh-known-hosts: ${{ inputs.ssh-known-hosts }}

    - name: Login to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ inputs.github-token }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        driver-opts: |
          image=moby/buildkit:v0.12.1
          network=${{ inputs.docker-build-network }}
        version: v0.30.1

    - name: Download nsys-jax version.py
      uses: actions/download-artifact@v8
      with:
        name: nsys-jax-version-file

    - name: Move version.py
      shell: bash
      run: |
        ls
        mv version.py .github/container/nsys_jax/nsys_jax/
        cat .github/container/nsys_jax/nsys_jax/version.py

    - name: Restore Bazel disk cache
      if: inputs.ENABLE_BAZEL_DISK_CACHE == 'true'
      uses: actions/cache/restore@v4
      with:
        path: /tmp/bazel-disk.tar
        key: bazel-disk-cache-${{ inputs.ARCHITECTURE }}-${{ steps.bazel-cache-metadata.outputs.branch }}-${{ github.run_id }}
        restore-keys: |
          bazel-disk-cache-${{ inputs.ARCHITECTURE }}-${{ steps.bazel-cache-metadata.outputs.branch }}-

    - name: Restore Bazel repo cache
      if: inputs.ENABLE_BAZEL_REPO_CACHE == 'true'
      uses: actions/cache/restore@v4
      with:
        path: /tmp/bazel-repo.tar
        key: bazel-repo-cache-${{ inputs.ARCHITECTURE }}-${{ steps.bazel-cache-metadata.outputs.branch }}-${{ github.run_id }}
        restore-keys: |
          bazel-repo-cache-${{ inputs.ARCHITECTURE }}-${{ steps.bazel-cache-metadata.outputs.branch }}-

    - name: Prepare Bazel cache seed directories
      if: inputs.ENABLE_BAZEL_DISK_CACHE == 'true' || inputs.ENABLE_BAZEL_REPO_CACHE == 'true'
      shell: bash
      run: |
        set -euxo pipefail
        rm -rf /tmp/bazel-disk-cache /tmp/bazel-repo-cache
        rm -rf /tmp/bazel-disk-export /tmp/bazel-repo-export
        mkdir -p /tmp/bazel-disk-cache /tmp/bazel-repo-cache
        mkdir -p /tmp/bazel-disk-export /tmp/bazel-repo-export
        if [[ -f /tmp/bazel-disk.tar ]]; then
          tar -xf /tmp/bazel-disk.tar -C /tmp/bazel-disk-cache
        fi
        if [[ -f /tmp/bazel-repo.tar ]]; then
          tar -xf /tmp/bazel-repo.tar -C /tmp/bazel-repo-cache
        fi

    # MEALKIT BUILD
    - name: Set docker metadata - mealkit
      id: mealkit-metadata
      uses: docker/metadata-action@v6
      with:
        images: |
          ${{ env.UPLD_IMAGE }}
        flavor: |
          latest=false
        tags: |
          type=raw,value=${{ github.run_id }}-${{ inputs.CONTAINER_NAME }}-${{ inputs.ARCHITECTURE }}-mealkit
        labels:
          org.opencontainers.image.created=${{ inputs.BUILD_DATE }}

    - name: Build mealkit image
      id: mealkit-build
      uses: docker/build-push-action@v7
      with:
        allow: ${{ inputs.docker-build-allow }}
        build-contexts: ${{ steps.bazel-cache-metadata.outputs.build_contexts }}
        context: ${{ inputs.DOCKER_CONTEXT }}
        push: true
        file: ${{ inputs.DOCKERFILE }}
        network: ${{ inputs.docker-build-network }}
        platforms: linux/${{ inputs.ARCHITECTURE }}
        target: mealkit
        tags: ${{ steps.mealkit-metadata.outputs.tags }}
        labels: ${{ steps.mealkit-metadata.outputs.labels }}
        ssh: default
        secret-files: |
          "SSH_KNOWN_HOSTS=${{ steps.setup-ssh.outputs.known-hosts-file }}"
        build-args: |
          BASE_IMAGE=${{ inputs.BASE_IMAGE }}
          BAZEL_CACHE=${{ env.BAZEL_CACHE_VALUE }}
          BUILD_DATE=${{ inputs.BUILD_DATE }}
          ${{ inputs.EXTRA_BUILD_ARGS }}
    # FINAL IMAGE BUILD
    - name: Set docker metadata - final
      id: final-metadata
      uses: docker/metadata-action@v6
      with:
        images: |
          ${{ env.UPLD_IMAGE }}
        flavor: |
          latest=false
        tags: |
          type=raw,value=${{ github.run_id }}-${{ inputs.CONTAINER_NAME }}-${{ inputs.ARCHITECTURE }}
        labels:
          org.opencontainers.image.created=${{ inputs.BUILD_DATE }}

    - name: Build final image
      id: final-build
      uses: docker/build-push-action@v7
      with:
        allow: ${{ inputs.docker-build-allow }}
        build-contexts: ${{ steps.bazel-cache-metadata.outputs.build_contexts }}
        context: ${{ inputs.DOCKER_CONTEXT }}
        push: true
        file: ${{ inputs.DOCKERFILE }}
        network: ${{ inputs.docker-build-network }}
        platforms: linux/${{ inputs.ARCHITECTURE }}
        tags: ${{ steps.final-metadata.outputs.tags }}
        labels: ${{ steps.final-metadata.outputs.labels }}
        target: final
        ssh: default
        secret-files: |
          "SSH_KNOWN_HOSTS=${{ steps.setup-ssh.outputs.known-hosts-file }}"
        build-args: |
          BASE_IMAGE=${{ inputs.BASE_IMAGE }}
          BAZEL_CACHE=${{ env.BAZEL_CACHE_VALUE }}
          BUILD_DATE=${{ inputs.BUILD_DATE }}
          ${{ inputs.EXTRA_BUILD_ARGS }}

    - name: Export Bazel disk cache
      if: inputs.ENABLE_BAZEL_DISK_CACHE == 'true'
      uses: docker/build-push-action@v7
      with:
        build-contexts: ${{ steps.bazel-cache-metadata.outputs.build_contexts }}
        context: ${{ inputs.DOCKER_CONTEXT }}
        push: false
        file: ${{ inputs.DOCKERFILE }}
        platforms: linux/${{ inputs.ARCHITECTURE }}
        target: bazel-disk-export
        outputs: type=local,dest=/tmp/bazel-disk-export
        build-args: |
          BASE_IMAGE=${{ inputs.BASE_IMAGE }}
          BUILD_DATE=${{ inputs.BUILD_DATE }}
          CACHE_EXPORT_STAMP=${{ github.run_id }}-${{ github.run_attempt }}
          ${{ inputs.EXTRA_BUILD_ARGS }}

    - name: Pack Bazel disk cache tarball
      if: inputs.ENABLE_BAZEL_DISK_CACHE == 'true'
      shell: bash
      run: |
        set -euxo pipefail
        tar -cf /tmp/bazel-disk.tar -C /tmp/bazel-disk-export .

    - name: Export Bazel repo cache
      if: inputs.ENABLE_BAZEL_REPO_CACHE == 'true'
      uses: docker/build-push-action@v7
      with:
        build-contexts: ${{ steps.bazel-cache-metadata.outputs.build_contexts }}
        context: ${{ inputs.DOCKER_CONTEXT }}
        push: false
        file: ${{ inputs.DOCKERFILE }}
        platforms: linux/${{ inputs.ARCHITECTURE }}
        target: bazel-repo-export
        outputs: type=local,dest=/tmp/bazel-repo-export
        build-args: |
          BASE_IMAGE=${{ inputs.BASE_IMAGE }}
          BUILD_DATE=${{ inputs.BUILD_DATE }}
          CACHE_EXPORT_STAMP=${{ github.run_id }}-${{ github.run_attempt }}
          ${{ inputs.EXTRA_BUILD_ARGS }}

    - name: Pack Bazel repo cache tarball
      if: inputs.ENABLE_BAZEL_REPO_CACHE == 'true'
      shell: bash
      run: |
        set -euxo pipefail
        tar -cf /tmp/bazel-repo.tar -C /tmp/bazel-repo-export .

    - name: Save Bazel disk cache
      if: inputs.ENABLE_BAZEL_DISK_CACHE == 'true'
      uses: actions/cache/save@v4
      with:
        path: /tmp/bazel-disk.tar
        key: bazel-disk-cache-${{ inputs.ARCHITECTURE }}-${{ steps.bazel-cache-metadata.outputs.branch }}-${{ github.run_id }}

    - name: Save Bazel repo cache
      if: inputs.ENABLE_BAZEL_REPO_CACHE == 'true'
      uses: actions/cache/save@v4
      with:
        path: /tmp/bazel-repo.tar
        key: bazel-repo-cache-${{ inputs.ARCHITECTURE }}-${{ steps.bazel-cache-metadata.outputs.branch }}-${{ github.run_id }}

    # SITREP GENERATION
    - name: Generate sitrep
      if: "!cancelled()"
      shell: bash -x -e {0}
      run: |
        # bring in utility functions
        source .github/workflows/scripts/to_json.sh

        badge_label='${{ inputs.CONTAINER_NAME }} ${{ inputs.ARCHITECTURE }} build'
        tags="${{ steps.final-metadata.outputs.tags }}"
        digest="${{ steps.final-build.outputs.digest }}"
        outcome="${{ steps.final-build.outcome }}"

        if [[ ${outcome} == "success" ]]; then
          badge_message="pass"
          badge_color=brightgreen
          summary="${{ inputs.CONTAINER_NAME }} build on ${{ inputs.ARCHITECTURE }}: $badge_message"
        else
          badge_message="fail"
          badge_color=red
          summary="${{ inputs.CONTAINER_NAME }} build on ${{ inputs.ARCHITECTURE }}: $badge_message"
        fi

        to_json \
          summary \
          badge_label tags digest outcome \
        > sitrep.json

        schemaVersion=1 \
        label="${badge_label}" \
        message="${badge_message}" \
        color="${badge_color}" \
        to_json schemaVersion label message color \
        > ${{ env.BADGE_FILENAME_FULL }}

    - name: Upload sitrep and badge
      if: "!cancelled()"
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.ARTIFACT_NAME }}-${{ inputs.ARCHITECTURE }}
        path: |
          sitrep.json
          ${{ env.BADGE_FILENAME_FULL }}

    - name: Export outputs
      id: export
      shell: bash
      run: |
        echo "DOCKER_TAG_MEALKIT=${{ steps.mealkit-metadata.outputs.tags }}" >> "$GITHUB_OUTPUT"
        echo "DOCKER_TAG_FINAL=${{ steps.final-metadata.outputs.tags }}"     >> "$GITHUB_OUTPUT"
