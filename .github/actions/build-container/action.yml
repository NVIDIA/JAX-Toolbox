name: Build container

description: "Builds a Docker container image for JAX-based projects using NVIDIA's Mealkit and uploads it to GitHub Container Registry."

inputs:
  ARCHITECTURE:
    description: 'CPU architecture to build the image for, e.g. amd64, arm64'
    required: true
  BASE_IMAGE:
    description: 'Base docker image that provides JAX'
    required: false
    default: ghcr.io/nvidia/jax:mealkit
  BUILD_DATE:
    description: "Build date in YYYY-MM-DD format"
    required: false
    default: 'NOT SPECIFIED'
  ARTIFACT_NAME:
    description: 'Name of the artifact zip file, e.g. artifact-maxtext-build'
    required: true
  BADGE_FILENAME:
    description: 'Name of the endpoint JSON file for shields.io badge, e.g. badge-maxtext-build'
    required: true
  CONTAINER_NAME:
    description: "Container name, e.g. maxtext"
    required: true
  DOCKERFILE:
    description: "Dockerfile to use, e.g. .github/container/Dockerfile.maxtext"
    required: true
  DOCKER_CONTEXT:
    description: "Dockerfile context to build"
    default: '.github/container'
    required: false
  RUNNER_SIZE:
    description: "Size of the runner to use"
    required: false
    default: small
  EXTRA_BUILD_ARGS:
    description: "Extra build arguments to pass to the Docker build"
    required: false
    default: ""
  ssh-private-key:
    description: "SSH private key to use for building the image"
    required: true
    default: ""
  ssh-known-hosts:
    description: "SSH known hosts entries to use for building the image"
    required: true
    default: ""
  github-token:
    description: "GitHub token to use for authentication"
    required: true
    default: ""
  bazel-remote-cache-url:
    description: "URL of the Bazel remote cache to use for building the image (http/grpc). Leave empty to use Dockerfile-default cache mount paths."
    required: false
    default: ""
  CACHE_REGISTRY:
    description: "OCI registry used for BuildKit layer cache (cache-to/cache-from). Must be writable by the GITHUB_TOKEN."
    required: false
    default: "ghcr.io/nvidia/jax-toolbox-internal"
  ENABLE_BAZEL_REPO_CACHE:
    description: "Enable Bazel repository-cache save/restore via actions/cache and build-context injection. Set to 'true' only for containers that run Bazel (i.e. build-jax)."
    required: false
    default: "false"
  ENABLE_BAZEL_DISK_CACHE:
    description: "Enable Bazel disk-cache save/restore via OCI registry image. Set to 'true' only for containers that run Bazel (i.e. build-jax). The cache image is pushed to CACHE_REGISTRY and seeded on subsequent runs via docker-image:// build context."
    required: false
    default: "false"

outputs:
  DOCKER_TAG_MEALKIT:
    description: "Tags of the 'mealkit' image built"
    value: ${{ steps.export.outputs.DOCKER_TAG_MEALKIT }}
  DOCKER_TAG_FINAL:
    description: "Tags of the complete image built"
    value: ${{ steps.export.outputs.DOCKER_TAG_FINAL }}

runs:
  using: 'composite'
  steps:
    - name: Set up environment variables
      shell: bash
      id: set-env
      run: |
        echo 'UPLD_IMAGE=ghcr.io/nvidia/jax-toolbox-internal' >> $GITHUB_ENV
        echo "BADGE_FILENAME_FULL=${{ inputs.BADGE_FILENAME }}-${{ inputs.ARCHITECTURE }}.json" >> $GITHUB_ENV

    - name: Set up build cache environment
      id: cache-env
      shell: bash
      run: |
        # Sanitize branch name: replace / and non-tag chars, cap at 100 chars
        BRANCH=$(echo "${{ github.ref_name }}" \
          | sed 's|/|-|g' \
          | tr -cs 'a-zA-Z0-9._-' '-' \
          | sed 's/^-//;s/-$//' \
          | cut -c1-100)

        CONTAINER="${{ inputs.CONTAINER_NAME }}"
        ARCH="${{ inputs.ARCHITECTURE }}"
        REGISTRY="${{ inputs.CACHE_REGISTRY }}"

        echo "CACHE_REF_MEALKIT_BRANCH=${REGISTRY}:${CONTAINER}-${ARCH}-${BRANCH}-mealkit" >> $GITHUB_ENV
        echo "CACHE_REF_MEALKIT_MAIN=${REGISTRY}:${CONTAINER}-${ARCH}-main-mealkit"         >> $GITHUB_ENV
        echo "CACHE_REF_FINAL_BRANCH=${REGISTRY}:${CONTAINER}-${ARCH}-${BRANCH}-final"     >> $GITHUB_ENV
        echo "CACHE_REF_FINAL_MAIN=${REGISTRY}:${CONTAINER}-${ARCH}-main-final"             >> $GITHUB_ENV
        # Dedicated OCI tag for the Bazel disk-cache snapshot image.
        # Keyed on container+arch+branch so branch builds don't pollute main's cache.
        echo "BAZEL_DISK_CACHE_REF=${REGISTRY}:bazel-disk-${CONTAINER}-${ARCH}-${BRANCH}" >> $GITHUB_ENV

        # Bazel repo-cache key: keyed on arch only so that restore-keys
        # always finds the most recent cache for this architecture, regardless of
        # which JAX/XLA commit is being built. EXTRA_BUILD_ARGS contains
        # URLREF_JAX=...#<commit> which changes every upstream push; including
        # it would cause a primary-key miss on every single run.
        echo "BAZEL_REPO_CACHE_KEY=bazel-repo-${ARCH}" >> $GITHUB_ENV

        # Pass BAZEL_CACHE build-arg only when a remote URL is explicitly given;
        # otherwise the Dockerfile default (/cache/bazel-disk) applies.
        if [[ -n "${{ inputs.bazel-remote-cache-url }}" ]]; then
          echo "BAZEL_CACHE_BUILD_ARG=BAZEL_CACHE=${{ inputs.bazel-remote-cache-url }}" >> $GITHUB_ENV
        else
          echo "BAZEL_CACHE_BUILD_ARG=" >> $GITHUB_ENV
        fi

    # Ensure the directory exists regardless of whether we restore a cache.
    # An empty directory fed via --build-context is equivalent to FROM scratch.
    - name: Prepare Bazel repo cache directory
      shell: bash
      run: mkdir -p /tmp/bazel-repo-cache

    - name: Restore Bazel repo cache
      id: restore-bazel-repo-cache
      if: inputs.ENABLE_BAZEL_REPO_CACHE == 'true'
      uses: actions/cache/restore@v4
      with:
        path: /tmp/bazel-repo-cache
        # Key: arch-scoped + run_id so each successful run saves a fresh entry.
        # restore-keys falls back to the most recent cache for this arch,
        # giving a warm repo cache even when the exact SHA differs.
        key: ${{ env.BAZEL_REPO_CACHE_KEY }}-${{ github.run_id }}
        restore-keys: |
          ${{ env.BAZEL_REPO_CACHE_KEY }}-

    - name: Setup SSH
      id: setup-ssh
      uses: ./.github/actions/setup-ssh
      with:
        ssh-private-key: ${{ inputs.ssh-private-key }}
        ssh-known-hosts: ${{ inputs.ssh-known-hosts }}

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ inputs.github-token }}

    # Check whether a disk-cache OCI image from a previous run exists.
    # Must run AFTER Login to GHCR — docker manifest inspect needs credentials
    # to query a private registry; without them it always returns false.
    - name: Check Bazel disk cache image
      id: disk-cache-check
      if: inputs.ENABLE_BAZEL_DISK_CACHE == 'true'
      shell: bash
      run: |
        if docker manifest inspect "${BAZEL_DISK_CACHE_REF}" > /dev/null 2>&1; then
          echo "available=true" >> $GITHUB_OUTPUT
        else
          echo "available=false" >> $GITHUB_OUTPUT
        fi

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: |
          image=moby/buildkit:v0.12.1
        version: v0.30.1

    - name: Download nsys-jax version.py
      uses: actions/download-artifact@v4
      with:
        name: nsys-jax-version-file

    - name: Move version.py
      shell: bash
      run: |
        ls
        mv version.py .github/container/nsys_jax/nsys_jax/
        cat .github/container/nsys_jax/nsys_jax/version.py

    # MEALKIT BUILD
    - name: Set docker metadata - mealkit
      id: mealkit-metadata
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.UPLD_IMAGE }}
        flavor: |
          latest=false
        tags: |
          type=raw,value=${{ github.run_id }}-${{ inputs.CONTAINER_NAME }}-${{ inputs.ARCHITECTURE }}-mealkit
        labels:
          org.opencontainers.image.created=${{ inputs.BUILD_DATE }}

    - name: Build mealkit image
      id: mealkit-build
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.DOCKER_CONTEXT }}
        push: true
        file: ${{ inputs.DOCKERFILE }}
        platforms: linux/${{ inputs.ARCHITECTURE }}
        target: mealkit
        tags: ${{ steps.mealkit-metadata.outputs.tags }}
        labels: ${{ steps.mealkit-metadata.outputs.labels }}
        ssh: default
        secret-files: |
          "SSH_KNOWN_HOSTS=${{ steps.setup-ssh.outputs.known-hosts-file }}"
        build-args: |
          BASE_IMAGE=${{ inputs.BASE_IMAGE }}
          BUILD_DATE=${{ inputs.BUILD_DATE }}
          ${{ env.BAZEL_CACHE_BUILD_ARG }}
          ${{ inputs.EXTRA_BUILD_ARGS }}
        # Inject pre-restored Bazel repo cache as a named build context.
        # The Dockerfile declares `FROM scratch AS bazel-repo-seed`; passing this
        # context overrides that stage with the contents of the local directory.
        # When the directory is empty (cold start) the bind-mount is a no-op.
        # Inject disk cache OCI image when available (pushed by a previous run).
        # Empty string when ENABLE_BAZEL_DISK_CACHE is false or image is absent,
        # which leaves the bazel-disk-seed stage as FROM scratch (no-op seed).
        build-contexts: |
          bazel-repo-seed=/tmp/bazel-repo-cache
          ${{ inputs.ENABLE_BAZEL_DISK_CACHE == 'true' && steps.disk-cache-check.outputs.available == 'true' && format('bazel-disk-seed=docker-image://{0}', env.BAZEL_DISK_CACHE_REF) || '' }}
        cache-from: |
          type=registry,ref=${{ env.CACHE_REF_MEALKIT_BRANCH }}
          type=registry,ref=${{ env.CACHE_REF_MEALKIT_MAIN }}
        # mode=max: cache ALL intermediate stages (builder, mealkit) so
        # full Bazel layer is reusable on the next run.
        # ignore-error=true: cache push failure must never kill the build.
        cache-to: type=registry,ref=${{ env.CACHE_REF_MEALKIT_BRANCH }},mode=max,oci-mediatypes=true,image-manifest=true,compression=zstd,ignore-error=true

    # FINAL IMAGE BUILD
    - name: Set docker metadata - final
      id: final-metadata
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.UPLD_IMAGE }}
        flavor: |
          latest=false
        tags: |
          type=raw,value=${{ github.run_id }}-${{ inputs.CONTAINER_NAME }}-${{ inputs.ARCHITECTURE }}
        labels:
          org.opencontainers.image.created=${{ inputs.BUILD_DATE }}

    - name: Build final image
      id: final-build
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.DOCKER_CONTEXT }}
        push: true
        file: ${{ inputs.DOCKERFILE }}
        platforms: linux/${{ inputs.ARCHITECTURE }}
        tags: ${{ steps.final-metadata.outputs.tags }}
        labels: ${{ steps.final-metadata.outputs.labels }}
        target: final
        ssh: default
        secret-files: |
          "SSH_KNOWN_HOSTS=${{ steps.setup-ssh.outputs.known-hosts-file }}"
        build-args: |
          BASE_IMAGE=${{ inputs.BASE_IMAGE }}
          BUILD_DATE=${{ inputs.BUILD_DATE }}
          ${{ env.BAZEL_CACHE_BUILD_ARG }}
          ${{ inputs.EXTRA_BUILD_ARGS }}
        build-contexts: |
          bazel-repo-seed=/tmp/bazel-repo-cache
          ${{ inputs.ENABLE_BAZEL_DISK_CACHE == 'true' && steps.disk-cache-check.outputs.available == 'true' && format('bazel-disk-seed=docker-image://{0}', env.BAZEL_DISK_CACHE_REF) || '' }}
        cache-from: |
          type=registry,ref=${{ env.CACHE_REF_FINAL_BRANCH }}
          type=registry,ref=${{ env.CACHE_REF_FINAL_MAIN }}
          type=registry,ref=${{ env.CACHE_REF_MEALKIT_BRANCH }}
          type=registry,ref=${{ env.CACHE_REF_MEALKIT_MAIN }}
        # mode=min: builder+mealkit layers are already cached under CACHE_REF_MEALKIT_BRANCH
        # (mode=max above).  Only cache the final stage's unique layers here.
        cache-to: type=registry,ref=${{ env.CACHE_REF_FINAL_BRANCH }},mode=min,oci-mediatypes=true,image-manifest=true,compression=zstd,ignore-error=true

    # BAZEL DISK CACHE EXPORT
    # Pushes a snapshot of /cache/bazel-disk (from the BuildKit cache mount) to
    # a dedicated OCI registry image.  Uses the bazel-disk-export Dockerfile
    # target which inherits via bazel-disk-snapshot-builder → builder.
    #
    # IMPORTANT: this step runs BEFORE Export Bazel repo cache.  The repo-cache
    # export step swaps /tmp/bazel-repo-cache with the freshly-exported version,
    # which changes the bazel-repo-seed build context hash.  If disk-export ran
    # after that swap, BuildKit would see a different bazel-repo-seed → different
    # builder layer hash → cache miss → full Bazel + TransformerEngine re-run
    # (~20 min wasted).  Running disk-export first keeps the context identical to
    # the mealkit build, so BuildKit reuses the cached builder layers and only
    # executes the fast bazel-disk-snapshot-builder cp step.
    #
    # The snapshot is NOT part of the mealkit/final dependency graph, so it does
    # NOT bloat the mode=max layer cache.  The same BuildKit daemon that ran the
    # mealkit build holds the cache mount, so this step sees the current run's
    # disk cache without re-invoking Bazel.
    #
    # continue-on-error: disk cache export failure must never block the build.
    - name: Export Bazel disk cache
      id: export-bazel-disk-cache
      if: inputs.ENABLE_BAZEL_DISK_CACHE == 'true' && steps.mealkit-build.outcome == 'success'
      continue-on-error: true
      shell: bash
      env:
        EXTRA_BUILD_ARGS: ${{ inputs.EXTRA_BUILD_ARGS }}
      run: |
        BUILD_ARG_FLAGS=()
        while IFS= read -r line; do
          [[ -z "$line" ]] && continue
          BUILD_ARG_FLAGS+=(--build-arg "$line")
        done <<< "$EXTRA_BUILD_ARGS"

        # Disk-seed context must match the mealkit build so BuildKit finds the
        # builder stage layers in the registry cache (no Bazel re-run).
        # The bazel-disk-snapshot-builder step still re-executes (ARG BUILD_DATE
        # in the Dockerfile busts its layer cache) to snapshot the current run's
        # disk cache from the BuildKit cache mount.
        DISK_SEED_CONTEXT_FLAGS=()
        if [[ "${{ steps.disk-cache-check.outputs.available }}" == "true" ]]; then
          DISK_SEED_CONTEXT_FLAGS+=(--build-context "bazel-disk-seed=docker-image://${BAZEL_DISK_CACHE_REF}")
        fi

        docker buildx build \
          --platform "linux/${{ inputs.ARCHITECTURE }}" \
          --file "${{ inputs.DOCKERFILE }}" \
          --target bazel-disk-export \
          --output "type=image,push=true,name=${BAZEL_DISK_CACHE_REF},compression=zstd,oci-mediatypes=true,image-manifest=true" \
          --cache-from "type=registry,ref=${{ env.CACHE_REF_MEALKIT_BRANCH }}" \
          --cache-from "type=registry,ref=${{ env.CACHE_REF_MEALKIT_MAIN }}" \
          --build-arg "BASE_IMAGE=${{ inputs.BASE_IMAGE }}" \
          --build-arg "BUILD_DATE=${{ inputs.BUILD_DATE }}" \
          --build-context "bazel-repo-seed=/tmp/bazel-repo-cache" \
          "${DISK_SEED_CONTEXT_FLAGS[@]}" \
          "${BUILD_ARG_FLAGS[@]}" \
          "${{ inputs.DOCKER_CONTEXT }}"

    # BAZEL REPO CACHE EXPORT
    # This step extracts /cache/bazel-repo from the builder stage back to the
    # runner so it can be saved via actions/cache.
    #
    # IMPORTANT: runs AFTER Export Bazel disk cache (see comment there).
    # At this point /tmp/bazel-repo-cache still has the same content as the
    # mealkit build → builder layer cache hit → only the COPY runs (~1 min).
    #
    # Cost: one registry pull of the builder layer + a local copy.
    - name: Export Bazel repo cache
      id: export-bazel-repo-cache
      if: inputs.ENABLE_BAZEL_REPO_CACHE == 'true' && steps.mealkit-build.outcome == 'success'
      shell: bash
      env:
        EXTRA_BUILD_ARGS: ${{ inputs.EXTRA_BUILD_ARGS }}
      run: |
        # Convert newline-separated build args into individual --build-arg flags
        BUILD_ARG_FLAGS=()
        while IFS= read -r line; do
          [[ -z "$line" ]] && continue
          BUILD_ARG_FLAGS+=(--build-arg "$line")
        done <<< "$EXTRA_BUILD_ARGS"

        # Export to a staging dir to avoid a read/write collision:
        # the build reads /tmp/bazel-repo-cache via --build-context and
        # would corrupt the seed if we wrote to the same path concurrently.
        rm -rf /tmp/bazel-repo-cache-new

        # Disk-seed context must match the mealkit build (same as disk-export step)
        # so BuildKit finds the cached builder layers.
        DISK_SEED_CONTEXT_FLAGS=()
        if [[ "${{ inputs.ENABLE_BAZEL_DISK_CACHE }}" == "true" && "${{ steps.disk-cache-check.outputs.available }}" == "true" ]]; then
          DISK_SEED_CONTEXT_FLAGS+=(--build-context "bazel-disk-seed=docker-image://${BAZEL_DISK_CACHE_REF}")
        fi

        docker buildx build \
          --platform "linux/${{ inputs.ARCHITECTURE }}" \
          --file "${{ inputs.DOCKERFILE }}" \
          --target bazel-repo-export \
          --output "type=local,dest=/tmp/bazel-repo-cache-new" \
          --cache-from "type=registry,ref=${{ env.CACHE_REF_MEALKIT_BRANCH }}" \
          --cache-from "type=registry,ref=${{ env.CACHE_REF_MEALKIT_MAIN }}" \
          --build-arg "BASE_IMAGE=${{ inputs.BASE_IMAGE }}" \
          --build-arg "BUILD_DATE=${{ inputs.BUILD_DATE }}" \
          --build-context "bazel-repo-seed=/tmp/bazel-repo-cache" \
          "${DISK_SEED_CONTEXT_FLAGS[@]}" \
          "${BUILD_ARG_FLAGS[@]}" \
          "${{ inputs.DOCKER_CONTEXT }}"

        # Swap staging into the canonical location for actions/cache/save
        rm -rf /tmp/bazel-repo-cache
        mv /tmp/bazel-repo-cache-new /tmp/bazel-repo-cache

    - name: Save Bazel repo cache
      if: inputs.ENABLE_BAZEL_REPO_CACHE == 'true' && steps.export-bazel-repo-cache.outcome == 'success'
      uses: actions/cache/save@v4
      with:
        path: /tmp/bazel-repo-cache
        # Same key as restore: arch + run_id.  Each successful run overwrites
        # the previous entry, keeping the cache fresh without unbounded growth.
        key: ${{ env.BAZEL_REPO_CACHE_KEY }}-${{ github.run_id }}

    # SITREP GENERATION
    - name: Generate sitrep
      if: "!cancelled()"
      shell: bash -x -e {0}
      run: |
        # bring in utility functions
        source .github/workflows/scripts/to_json.sh

        badge_label='${{ inputs.CONTAINER_NAME }} ${{ inputs.ARCHITECTURE }} build'
        tags="${{ steps.final-metadata.outputs.tags }}"
        digest="${{ steps.final-build.outputs.digest }}"
        outcome="${{ steps.final-build.outcome }}"

        if [[ ${outcome} == "success" ]]; then
          badge_message="pass"
          badge_color=brightgreen
          summary="${{ inputs.CONTAINER_NAME }} build on ${{ inputs.ARCHITECTURE }}: $badge_message"
        else
          badge_message="fail"
          badge_color=red
          summary="${{ inputs.CONTAINER_NAME }} build on ${{ inputs.ARCHITECTURE }}: $badge_message"
        fi

        to_json \
          summary \
          badge_label tags digest outcome \
        > sitrep.json

        schemaVersion=1 \
        label="${badge_label}" \
        message="${badge_message}" \
        color="${badge_color}" \
        to_json schemaVersion label message color \
        > ${{ env.BADGE_FILENAME_FULL }}

    - name: Upload sitrep and badge
      if: "!cancelled()"
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.ARTIFACT_NAME }}-${{ inputs.ARCHITECTURE }}
        path: |
          sitrep.json
          ${{ env.BADGE_FILENAME_FULL }}

    - name: Export outputs
      id: export
      shell: bash
      run: |
        echo "DOCKER_TAG_MEALKIT=${{ steps.mealkit-metadata.outputs.tags }}" >> "$GITHUB_OUTPUT"
        echo "DOCKER_TAG_FINAL=${{ steps.final-metadata.outputs.tags }}"     >> "$GITHUB_OUTPUT"
