# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: nvidia-jax-toolbox.docs.buildwithfern.com/jax-toolbox
    # custom-domain: docs.nvidia.com/jax-toolbox/

title: JAX Toolbox

global-theme: nvidia

agents:
  page-directive: "For clean Markdown content of this page, append .md to this URL. For the complete documentation index, see https://nvidia-jax-toolbox.docs.buildwithfern.com/jax-toolbox/llms.txt"

products:
  - display-name: JAX Toolbox
    slug: /
    path: ../docs/index.yml
    versions:
      - display-name: dev
        path: ../docs/index.yml

navbar-links:
  - type: github
    value: https://github.com/NVIDIA/JAX-Toolbox

layout:
  searchbar-placement: header
  page-width: 1376px
  sidebar-width: 248px
  content-width: 812px
  tabs-placement: header
  hide-feedback: true

metadata:
  canonical-host: "nvidia-jax-toolbox.docs.buildwithfern.com"

experimental:
  mdx-components:
    - ../docs/_components
  basepath-aware: true

colors:
  accentPrimary:
    dark: '#76B900'
    light: '#76B900'
  background:
    light: '#FFFFFF'
    dark: '#000000'

theme:
  page-actions: toolbar
  footer-nav: minimal

logo:
  right-text: Documentation

js:
  - url: https://assets.adobedtm.com/5d4962a43b79/c1061d2c5e7b/launch-191c2462b890.min.js
    strategy: beforeInteractive
