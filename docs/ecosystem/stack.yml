# ==========================================================================
# JAX on NVIDIA-GPU Stack — unit-grid / row-flow model
# ==========================================================================
# Source of truth for the ecosystem-overview page. Consumed by
# scripts/build-ecosystem.mjs (see docs/ecosystem/plan.md).
#
# MODEL (12-column-style unit grid):
#   columns — header groupings, in order, each with a `width` in UNITS. The
#             total units U = sum(widths) becomes the grid resolution
#             (U equal tracks). Column headers span their unit range.
#   rows    — horizontal bands, top -> bottom. Each row has a `label` and a
#             `cells` list that FLOWS left-to-right: every cell takes `width`
#             units starting where the previous one ended. A cell can therefore
#             straddle a column boundary (e.g. width 2 landing on units 9-10
#             crosses Training|Inference). Widths in a row may sum to < U
#             (trailing space stays empty); > U warns and clamps.
#   projects — registry only (id, name, category, href, overview). Placement
#             lives in rows[].cells[].projects.
#
# category = box FILL color: nvidia = green (developed OR optimized),
# jax = JAX Blue, other = gray. "optimized" is why Tokamax/AlphaFold3 are green
# though they originate at Google/DeepMind.
#
# Subdividing a row (the use case this model was built for) — with columns
# 2 / 7 / 3 (U = 12), a row's cells of widths 2,4,2,2,2 give: one Tooling cell,
# two Training cells, a cell straddling Training|Inference (units 9-10), and one
# Inference cell:
#     cells:
#       - { width: 2, projects: [...] }
#       - { width: 4, projects: [...] }
#       - { width: 2, projects: [...] }
#       - { width: 2, projects: [...] }   # straddles Training|Inference
#       - { width: 2, projects: [...] }
# ==========================================================================

# Header groupings; `width` in units. Total U = 2 + 7 + 3 = 12.
columns:
  - { id: tooling,   label: Tooling,                  width: 2 }
  - { id: training,  label: Training / Post-Training,  width: 7 }
  - { id: inference, label: Inference,                width: 3 }

# Fill categories -> legend label + CSS class (colors in fern/main.css).
categories:
  nvidia: { label: NVIDIA-developed / optimized, class: eco-cat-nvidia }
  jax:    { label: JAX-native / OSS ecosystem,   class: eco-cat-jax }
  other:  { label: Other / runtime,              class: eco-cat-other }

# Participation overlay: a blue (jax) box with a green outline = a project
# NVIDIA participates in upstream.
participation: { label: NVIDIA participates }

# Rows, top -> bottom. Each row's `cells` flow left-to-right by unit width.
# Defaults align cells to the columns (2 / 7 / 3); subdivide any row by
# replacing a cell with several narrower ones (see header example).
rows:
  - id: frameworks
    label: Frameworks
    cells:
      - { width: 2, projects: [nsight, nsys-jax] }
      - { width: 6, projects: [maxtext, maxdiffusion, axlearn] }
      - { width: 2, projects: [tokamax] }
      - { width: 2, projects: [alphafold3] }

  - id: ecosystem
    label: JAX ecosystem
    cells:
      - { width: 2, label: Profiling, projects: [xprof] }
      - { width: 3, label: Training libraries, projects: [grain, optax, orbax, tunix, qwix, flax, pallas-mosaicgpu] }
      - { width: 3, label: Scale & precision, projects: [jaxpp, te] }
      - { width: 2, label: Kernels, projects: [warp, cuequivariance, cutile, cutlass] }
      - { width: 2, label: Inference, projects: [flashinfer, mlir-trt] }

  - id: core
    label: "JAX · XLA · Pathways"
    cells:
      - { width: 12, projects: [jax, xla, pathways] }

  - id: native-xla
    label: native XLA
    cells:
      - { width: 2, projects: [cupti] }
      - { width: 10, label: "native XLA", projects: [cudnn, cublas, nccl, nvshmem] }

  - id: hardware
    label: Hardware
    cells:
      - { width: 12, projects: [hw-datacenter, hw-workstation, hw-rtx, hw-jetson] }

# Project registry (placement is in rows[].cells[]). Static nodes (no
# `overview`), e.g. hardware, render as non-clickable labels.
projects:
  - { id: maxtext,          name: MaxText,              category: jax,    href: ../frameworks/maxtext/README.md,                 overview: projects/maxtext.md, nvidia_participates: true }
  - { id: maxdiffusion,     name: MaxDiffusion,         category: jax,    href: https://github.com/AI-Hypercomputer/maxdiffusion, overview: projects/maxdiffusion.md, nvidia_participates: true }
  - { id: axlearn,          name: AXLearn,              category: jax,    href: ../frameworks/axlearn/README.md,                 overview: projects/axlearn.md, nvidia_participates: true }
  - { id: alphafold3,       name: AlphaFold3,           category: nvidia, href: https://github.com/google-deepmind/alphafold3,    overview: projects/alphafold3.md } # green = NVIDIA-optimized container; upstream Google DeepMind
  - { id: nsight,           name: Nsight,               category: nvidia, href: https://developer.nvidia.com/nsight-systems,      overview: projects/nsight.md }
  - { id: nsys-jax,         name: nsys-jax,             category: nvidia, href: ../nsys-jax.md,                                  overview: projects/nsys-jax.md }
  - { id: xprof,            name: XProf,                category: jax,    href: https://github.com/openxla/xprof,                 overview: projects/xprof.md }
  - { id: grain,            name: Grain,                category: jax,    href: https://github.com/google/grain,                 overview: projects/grain.md }
  - { id: optax,            name: Optax,                category: jax,    href: https://github.com/google-deepmind/optax,         overview: projects/optax.md, nvidia_participates: true }
  - { id: orbax,            name: Orbax,                category: jax,    href: https://github.com/google/orbax,                 overview: projects/orbax.md, nvidia_participates: true }
  - { id: tunix,            name: Tunix,                category: jax,    href: https://github.com/google/tunix,                 overview: projects/tunix.md }
  - { id: qwix,             name: Qwix,                 category: jax,    href: https://github.com/google/qwix,                  overview: projects/qwix.md }
  - { id: flax,             name: Flax,                 category: jax,    href: https://github.com/google/flax,                  overview: projects/flax.md, nvidia_participates: true }
  - { id: pallas-mosaicgpu, name: Pallas / Mosaic GPU,  category: jax,    href: https://docs.jax.dev/en/latest/pallas/index.html, overview: projects/pallas-mosaicgpu.md }
  - { id: jaxpp,            name: JaxPP,                category: nvidia, href: https://github.com/NVIDIA/JaxPP,                  overview: projects/jaxpp.md }
  - { id: te,               name: TransformerEngine,    category: nvidia, href: https://github.com/NVIDIA/TransformerEngine,      overview: projects/transformer-engine.md }
  - { id: warp,             name: Warp,                 category: nvidia, href: https://github.com/NVIDIA/warp,                   overview: projects/warp.md }
  - { id: cuequivariance,   name: cuEquivariance,       category: nvidia, href: https://github.com/NVIDIA/cuEquivariance,         overview: projects/cuequivariance.md }
  - { id: cutile,           name: cuTile,               category: nvidia,                                                        overview: projects/cutile.md }
  - { id: cutlass,          name: CUTLASS,              category: nvidia, href: https://github.com/NVIDIA/cutlass,                overview: projects/cutlass.md }
  - { id: tokamax,          name: Tokamax,              category: jax,    href: https://github.com/google/tokamax,                overview: projects/tokamax.md, nvidia_participates: true } # blue+outline = NVIDIA participates; upstream Google
  - { id: flashinfer,       name: FlashInfer,           category: nvidia, href: https://github.com/flashinfer-ai/flashinfer,      overview: projects/flashinfer.md }
  - { id: mlir-trt,         name: MLIR-TRT,             category: nvidia, href: https://github.com/NVIDIA/TensorRT-Incubator,     overview: projects/mlir-trt.md }
  - { id: jax,              name: JAX,                  category: jax,    href: https://github.com/jax-ml/jax,                    overview: projects/jax.md, nvidia_participates: true }
  - { id: xla,              name: XLA,                  category: jax,    href: https://github.com/openxla/xla,                   overview: projects/xla.md, nvidia_participates: true }
  - { id: pathways,         name: Pathways,             category: other,                                                         overview: projects/pathways.md }
  - { id: cupti,            name: CUPTI,                category: nvidia, href: https://docs.nvidia.com/cupti/,                   overview: projects/cupti.md }
  - { id: cudnn,            name: cuDNN,                category: nvidia, href: https://developer.nvidia.com/cudnn,               overview: projects/cudnn.md }
  - { id: cublas,           name: cuBLAS / cuBLASLt,    category: nvidia, href: https://developer.nvidia.com/cublas,              overview: projects/cublas.md }
